<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ 世界杯小游戏</title>
<style>
  :root{
    --pitch:#0b5d2e;
    --pitch-dark:#073d1d;
    --line:rgba(255,255,255,.85);
    --gold:#ffd34d;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Segoe UI",system-ui,"Microsoft YaHei",sans-serif;
    background:radial-gradient(circle at 50% 30%,#102a18,#04140b);
    color:#fff;
    display:flex;flex-direction:column;align-items:center;
    min-height:100vh;padding:18px 12px 30px;
    overflow-x:hidden;
  }
  h1{
    font-size:clamp(20px,3.4vw,30px);
    letter-spacing:2px;
    background:linear-gradient(90deg,var(--gold),#fff7cf,var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    margin-bottom:6px;text-shadow:0 2px 18px rgba(255,211,77,.25);
  }
  .subtitle{opacity:.7;font-size:13px;margin-bottom:14px}

  .scoreboard{
    width:min(480px,92vw);
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    background:linear-gradient(180deg,#1a3324,#0d2014);
    border:1px solid rgba(255,255,255,.12);
    border-radius:14px;padding:10px 16px;
    box-shadow:0 8px 30px rgba(0,0,0,.45);
  }
  .team{display:flex;flex-direction:column;align-items:center;min-width:120px}
  .flag{font-size:30px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));min-height:32px;display:flex;align-items:center;justify-content:center}
  .tname{font-size:13px;margin-top:3px;opacity:.92;font-weight:600}
  .goals{font-size:30px;font-weight:800;letter-spacing:1px;color:#fff;text-shadow:0 0 12px rgba(255,211,77,.5)}
  .vs{font-size:12px;opacity:.55;letter-spacing:2px}
  .center{display:flex;flex-direction:column;align-items:center;gap:2px}

  .clock-wrap{width:min(480px,92vw);margin:12px 0 4px}
  .clock{
    display:flex;align-items:baseline;justify-content:center;gap:6px;
    font-variant-numeric:tabular-nums;
  }
  .clock .min{font-size:26px;font-weight:800;color:var(--gold)}
  .clock .lbl{font-size:12px;opacity:.6}
  .progress{
    height:8px;border-radius:6px;margin-top:6px;overflow:hidden;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
  }
  .progress>i{
    display:block;height:100%;width:0%;
    background:linear-gradient(90deg,#3ddb6a,var(--gold),#ff6b4a);
    transition:width .08s linear;
  }

  .stage{position:relative;width:min(480px,92vw);aspect-ratio:1/1;margin-top:10px}
  canvas{width:100%;height:100%;display:block;border-radius:18px;
    box-shadow:0 16px 50px rgba(0,0,0,.55),inset 0 0 0 2px rgba(255,255,255,.06)}

  .overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;
    background:radial-gradient(circle at 50% 50%,rgba(4,20,11,.82),rgba(4,20,11,.95));
    border-radius:18px;text-align:center;padding:20px;
    transition:opacity .4s;backdrop-filter:blur(2px);
  }
  .overlay.hidden{opacity:0;pointer-events:none}
  .overlay h2{font-size:clamp(22px,4vw,34px);color:var(--gold)}
  .result-line{font-size:clamp(28px,6vw,46px);font-weight:800;letter-spacing:2px;
    text-shadow:0 0 22px rgba(255,211,77,.45)}
  .result-tag{font-size:14px;opacity:.8;margin-top:-6px;letter-spacing:6px}

  /* ---------- 比赛结束：结果卡片 ---------- */
  .final-result{
    display:flex;align-items:center;justify-content:center;gap:14px;
    width:100%;max-width:520px;margin:6px 0 2px;
  }
  .final-team{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    min-width:104px;padding:10px 8px;border-radius:14px;
    background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01));
    border:1px solid rgba(255,255,255,.12);
    transition:transform .25s,box-shadow .25s,border-color .25s;
  }
  .final-team.winner{
    transform:scale(1.1);
    border-color:rgba(255,211,77,.7);
    box-shadow:0 0 26px rgba(255,211,77,.45),0 0 60px rgba(255,211,77,.18);
  }
  .final-team .fflag{width:62px;height:44px;object-fit:cover;border-radius:6px;
    box-shadow:0 4px 12px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.25)}
  .final-team .fname{
    font-size:clamp(16px,2.6vw,22px);font-weight:800;letter-spacing:.5px;
    text-align:center;line-height:1.15;
  }
  .final-team.winner .fname{
    color:var(--gold);text-shadow:0 0 14px rgba(255,211,77,.55);
  }
  .final-score{
    font-size:clamp(46px,9vw,72px);font-weight:900;letter-spacing:2px;
    font-variant-numeric:tabular-nums;line-height:1;
    color:#fff;text-shadow:0 0 22px rgba(255,211,77,.55),0 4px 18px rgba(0,0,0,.6);
    display:flex;align-items:center;gap:10px;
  }
  .final-score .pen{
    font-size:.4em;font-weight:700;opacity:.85;color:var(--gold);
    display:flex;flex-direction:column;align-items:center;line-height:1.1;
  }
  .final-score .pen small{font-size:.62em;opacity:.7;font-weight:600;letter-spacing:1px}
  .final-tag{
    display:inline-block;margin-top:10px;padding:4px 16px;border-radius:20px;
    font-size:13px;font-weight:800;letter-spacing:4px;
    background:rgba(255,211,77,.14);border:1px solid rgba(255,211,77,.4);color:var(--gold);
  }
  .final-winner-line{
    margin-top:8px;font-size:clamp(15px,2.4vw,19px);font-weight:700;opacity:.92;
    text-align:center;
  }

  button{
    cursor:pointer;border:none;outline:none;
    font-family:inherit;font-weight:700;letter-spacing:1px;
  }
  .btn{
    background:linear-gradient(180deg,var(--gold),#f0a93a);
    color:#3a2400;padding:12px 30px;border-radius:30px;font-size:16px;
    box-shadow:0 6px 18px rgba(240,169,58,.4);transition:transform .12s,box-shadow .12s;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(240,169,58,.55)}
  .btn:active{transform:translateY(0)}

  .hint{font-size:11px;opacity:.45;margin-top:10px}

  .goal-flash{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.6);
    display:flex;flex-direction:column;align-items:center;gap:6px;
    font-size:clamp(34px,8vw,64px);font-weight:900;color:#fff;
    text-shadow:0 0 24px var(--gold),0 0 50px #ff6b4a;letter-spacing:3px;
    opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
  }
  .goal-flash.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  .goal-flash .gname{
    font-size:.42em;letter-spacing:1px;font-weight:800;color:var(--gold);
    text-shadow:0 0 14px rgba(255,211,77,.6);white-space:nowrap;
  }

  /* ---------- 整体布局：左半区树 | 中球场 | 右半区树 ---------- */
  :root{--ln:rgba(255,255,255,.28)}
  .layout{
    display:flex;gap:14px;align-items:flex-start;justify-content:center;
    width:min(1600px,99vw);margin-top:6px;
  }
  .bracket-side{
    flex:0 0 540px;display:flex;flex-direction:column;align-items:stretch;
    background:linear-gradient(180deg,#15281c,#0b1810);
    border:1px solid rgba(255,255,255,.12);border-radius:14px;
    padding:10px 8px;box-shadow:0 8px 30px rgba(0,0,0,.45);
  }
  .bracket-head{font-weight:800;font-size:14px;letter-spacing:1px;color:var(--gold);text-align:center;margin-bottom:4px}
  .bracket-sub{display:block;font-size:10px;font-weight:500;opacity:.6;letter-spacing:0;margin-top:2px}
  .center-panel{flex:1 1 560px;min-width:0;display:flex;flex-direction:column;align-items:center}
  .final-seat{
    margin-top:8px;font-size:12px;letter-spacing:2px;color:var(--gold);opacity:.85;
    padding:4px 14px;border:1px dashed rgba(255,211,77,.4);border-radius:20px;
  }

  /* ---------- 对阵树 ---------- */
  .bracket{display:flex;align-items:center;height:560px}
  .col{display:flex;flex-direction:column;justify-content:space-around;height:100%;flex:1;min-width:0}
  .gap{flex:0 0 16px}   /* 列间连接线空间 */

  .match{
    position:relative;display:block;cursor:pointer;text-align:left;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
    border-radius:6px;padding:3px 4px;width:100%;
    transition:background .12s,border-color .12s;
  }
  .match:hover{background:rgba(255,211,77,.16);border-color:rgba(255,211,77,.6)}
  .match.active{background:rgba(255,211,77,.24);border-color:var(--gold);box-shadow:0 0 10px rgba(255,211,77,.4)}
  .match.disabled{cursor:default;background:rgba(255,255,255,.02);border-style:dashed;opacity:.5}
  .mrow{display:flex;align-items:center;gap:5px;font-size:11.5px;line-height:1.5}
  .mrow .mf{width:18px;height:12px;object-fit:cover;border-radius:2px;flex:0 0 auto;border:1px solid rgba(255,255,255,.2)}
  .mrow .mn{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mrow.tbd{opacity:.55}
  .mrow.tbd .mn{font-style:italic}
  .mrow .ms{flex:0 0 auto;font-variant-numeric:tabular-nums;font-weight:700;min-width:11px;text-align:right;opacity:.9}
  .mrow.win .mn{color:var(--gold);font-weight:700}
  .mrow.win .ms{color:var(--gold)}
  .mrow.lose{opacity:.45}

  /* 连接线：左侧树向右生长。横向 stub 用 ::after，纵向母线用 ::before */
  .col.has-next .match::after{
    content:'';position:absolute;left:100%;top:50%;width:16px;border-top:2px solid var(--ln);
  }
  /* 顶部队伍（奇数）：母线向下到配对中点 */
  .col.has-next .match:nth-child(odd)::before{
    content:'';position:absolute;left:calc(100% + 16px);top:50%;
    height:35px;border-right:2px solid var(--ln);
  }
  /* 底部队伍（偶数）：母线向上到配对中点 */
  .col.has-next .match:nth-child(even)::before{
    content:'';position:absolute;left:calc(100% + 16px);bottom:50%;
    height:35px;border-right:2px solid var(--ln);
  }
  /* 不同轮次配对半高不同：r2=70px, r3=140px */
  .col.r2 .match:nth-child(odd)::before,
  .col.r2 .match:nth-child(even)::before{height:70px}
  .col.r3 .match:nth-child(odd)::before,
  .col.r3 .match:nth-child(even)::before{height:140px}

  /* 右侧树：列序反向 + 连接线改到左侧（不用 transform，保证国旗/文字正向） */
  .bracket.mirror{flex-direction:row-reverse}
  .bracket.mirror .col.has-next .match::after{left:auto;right:100%}
  .bracket.mirror .col.has-next .match::before{
    left:auto;right:calc(100% + 16px);border-right:none;border-left:2px solid var(--ln)
  }

  /* 时钟加时标签 */
  .extra-tag{font-size:11px;color:#ff8a4a;margin-left:6px;font-weight:700}

  /* ---------- 点球大战记录条 ---------- */
  .pens-bar{width:min(480px,92vw);margin-top:8px;display:flex;flex-direction:column;gap:4px}
  .pens-row{display:flex;align-items:center;gap:7px;font-size:12px;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
    border-radius:8px;padding:4px 8px}
  .pens-row .mf{width:20px;height:14px;object-fit:cover;border-radius:2px;flex:0 0 auto;border:1px solid rgba(255,255,255,.2)}
  .pens-row .pname{min-width:60px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pens-slots{display:flex;gap:4px;flex:1;flex-wrap:wrap}
  .pens-slot{width:17px;height:17px;border-radius:4px;display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:800;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
  .pens-slot.make{background:rgba(61,219,106,.25);border-color:#3ddb6a;color:#3ddb6a}
  .pens-slot.miss{background:rgba(255,90,90,.2);border-color:#ff5a5a;color:#ff5a5a}
  .pens-slot.now{box-shadow:0 0 8px rgba(255,211,77,.7);border-color:var(--gold);color:var(--gold)}

  @media(max-width:1280px){
    .layout{flex-direction:column;align-items:center}
    .bracket-side{flex:0 0 auto;width:min(640px,96vw)}
  }
</style>
</head>
<body>
  <h1>⚽ 世界杯小游戏</h1>
  <div class="subtitle">点「开始模拟」按钮开战；进球得分，90 分钟平局则加时至 120 分钟</div>

  <div class="layout">
    <!-- 左：上半区对阵树 -->
    <aside class="bracket-side">
      <div class="bracket-head">🏆 上半区
        <span class="bracket-sub">2026 美加墨</span>
      </div>
      <div class="bracket" id="bracketTop"></div>
    </aside>

    <!-- 中：球场 + 总决赛席位 -->
    <main class="center-panel">
      <div class="scoreboard">
        <div class="team">
          <div class="flag" id="flagA">🏳️</div>
          <div class="tname" id="nameA">A队</div>
          <div class="goals" id="scoreA">0</div>
        </div>
        <div class="center">
          <div class="vs">VS</div>
        </div>
        <div class="team">
          <div class="flag" id="flagB">🏳️</div>
          <div class="tname" id="nameB">B队</div>
          <div class="goals" id="scoreB">0</div>
        </div>
      </div>

      <div class="clock-wrap">
        <div class="clock">
          <span class="min" id="clockMin">0'</span>
          <span class="lbl" id="clockMax">/ 90'</span>
          <span class="extra-tag" id="extraTag"></span>
        </div>
        <div class="progress"><i id="progressBar"></i></div>
      </div>

      <div class="pens-bar" id="pensBar" style="display:none">
        <div class="pens-row" id="pensRowA"></div>
        <div class="pens-row" id="pensRowB"></div>
      </div>

      <div class="stage">
        <canvas id="pitch" width="640" height="640"></canvas>
        <div class="goal-flash" id="goalFlash">GOAL!</div>
        <div class="overlay" id="overlay">
          <h2 id="overlayTitle">⚽ 世界杯小游戏</h2>
          <div id="overlayBody" style="opacity:.85;font-size:14px;line-height:1.7">
            点击两侧对阵树任一场比赛即可开战<br>或点下方按钮 / 按 <b>空格键</b> 随机抽两队对战<br>进球需整球穿过门框、不碰立柱
          </div>
          <button class="btn" id="startBtn">随机开球</button>
        </div>
      </div>

      <div class="final-seat">🏆 总决赛席位</div>
      <div class="hint">物理弹球模拟 · 加速计时 · 平局加时至 120' · 空格键开始</div>
    </main>

    <!-- 右：下半区对阵树 -->
    <aside class="bracket-side">
      <div class="bracket-head">🏆 下半区
        <span class="bracket-sub">2026 美加墨</span>
      </div>
      <div class="bracket mirror" id="bracketBottom"></div>
    </aside>
  </div>

<script>
(function(){
  "use strict";

  // ---------- 国家池：[英文名, ISO代码, emoji回退] ----------
  const COUNTRIES = [
    ["Brazil","br","🇧🇷"],["Argentina","ar","🇦🇷"],["France","fr","🇫🇷"],["Germany","de","🇩🇪"],
    ["Spain","es","🇪🇸"],["England","gb-eng","🏴"],["Portugal","pt","🇵🇹"],["Netherlands","nl","🇳🇱"],
    ["Belgium","be","🇧🇪"],["Croatia","hr","🇭🇷"],["Mexico","mx","🇲🇽"],["Japan","jp","🇯🇵"],
    ["USA","us","🇺🇸"],["Morocco","ma","🇲🇦"],["Senegal","sn","🇸🇳"],["Switzerland","ch","🇨🇭"],
    ["Colombia","co","🇨🇴"],["Sweden","se","🇸🇪"],["Paraguay","py","🇵🇾"],["Canada","ca","🇨🇦"],
    ["Austria","at","🇦🇹"],["Bosnia","ba","🇧🇦"],["Ivory Coast","ci","🇨🇮"],["Norway","no","🇳🇴"],
    ["Ecuador","ec","🇪🇨"],["DR Congo","cd","🇨🇩"],["Cape Verde","cv","🇨🇻"],["Egypt","eg","🇪🇬"],
    ["Algeria","dz","🇩🇿"],["Ghana","gh","🇬🇭"],["South Africa","za","🇿🇦"],["Australia","au","🇦🇺"]
  ];

  // 国旗图片缓存（按 ISO 代码缓存 Image，避免重复加载）
  const flagImgs = {};
  function getFlagImg(code){
    if(!flagImgs[code]){
      const img = new Image();
      img.crossOrigin = "anonymous";     // 便于 canvas 绘制（flagcdn 支持 CORS）
      img.src = `https://flagcdn.com/${code}.svg`;
      flagImgs[code] = img;
    }
    return flagImgs[code];
  }

  // ---------- DOM ----------
  const canvas = document.getElementById("pitch");
  const ctx = canvas.getContext("2d");
  const elFlagA=document.getElementById("flagA"), elNameA=document.getElementById("nameA"), elScoreA=document.getElementById("scoreA");
  const elFlagB=document.getElementById("flagB"), elNameB=document.getElementById("nameB"), elScoreB=document.getElementById("scoreB");
  const elClock=document.getElementById("clockMin"), elBar=document.getElementById("progressBar"),
        elClockMax=document.getElementById("clockMax"), elExtraTag=document.getElementById("extraTag");
  const elOverlay=document.getElementById("overlay"), elOverlayTitle=document.getElementById("overlayTitle"), elOverlayBody=document.getElementById("overlayBody");
  const elStartBtn=document.getElementById("startBtn");
  const elFlash=document.getElementById("goalFlash");
  const elPensBar=document.getElementById("pensBar"),
        elPensRowA=document.getElementById("pensRowA"), elPensRowB=document.getElementById("pensRowB");

  // ---------- 几何 ----------
  const W = canvas.width, H = canvas.height;
  const CX = W/2, CY = H/2;
  const R = 290;            // 圆形球场半径
  const BALL_R = 38;        // 足球半径
  const GOAL_SPAN = 0.32;   // 球门弧度（约 24°，整球进框后实际可进窗口极小）

  // ---------- 配置 / 常量 ----------
  // 比赛流程
  const ALLOW_EXTRA = true;          // 是否允许加时赛（小组赛=false：90' 平局即终场，不进加时）
  const ALLOW_PENS = true;           // 是否允许点球大战（小组赛=false；仅在加时结束仍平局时触发）
  const FORCE_EXTRA = false;         // 测试开关：true=任何比分 90' 结束都强制进入加时赛
  const FORCE_PENS = false;          // 测试开关：true=任何比分结束都进点球；false=仅 120' 仍平局进点球
  const T_REG = 60,                  // 常规时间映射秒数（0~90'）
        T_EXTRA = 20,                // 加时映射秒数（90~120'，与常规同比例 0.667s/min）
        P_ACCEL = 1;                 // 计时曲线指数：1=匀速线性，>1=前慢后快（缓入）
  const KICKOFF_PAUSE = 1.0;         // 中圈开球后停顿秒数（半场 45' / 进球 / 加时开球 90' / 加时半场 105'）
  // 物理
  const TARGET_SP = 480;             // 足球恒定目标速率（像素/秒），始终保持高速
  // 点球大战
  const PEN_GOAL_P = 0.72,           // 单球进球概率
        PEN_GC = -Math.PI/2,         // 点球阶段球门固定角度（球场顶部）
        PEN_PREP = 0.5,              // 准备阶段秒数
        PEN_FLIGHT = 0.85,           // 飞行阶段秒数
        PEN_RESOLVE = 0.9,           // 落定阶段秒数
        PEN_GAP = 0.6;               // 轮次间隔秒数

  // ---------- 状态 ----------
  let state = null;         // 当前对局状态
  let rafId = null;
  let lastT = 0;

  function pickTwoCountries(){
    const pool = COUNTRIES.slice();
    const i = Math.floor(Math.random()*pool.length);
    const a = pool.splice(i,1)[0];
    const j = Math.floor(Math.random()*pool.length);
    const b = pool.splice(j,1)[0];
    return [a,b];
  }

  function makeBall(country, angleStart, color){
    const pos = polar(R*0.55, angleStart);
    const speed = 480;
    const dir = angleStart + Math.PI + (Math.random()-0.5)*1.2;
    return {
      name: country[0],     // 英文名
      code: country[1],     // ISO 代码（取国旗图）
      emoji: country[2],    // 加载前的 emoji 回退
      color: color,
      x: CX + pos.x, y: CY + pos.y,
      vx: Math.cos(dir)*speed,
      vy: Math.sin(dir)*speed,
      spin: 0,            // 旋转角，用来画国旗转动
      spinV: (Math.random()-0.5)*4,
      score: 0
    };
  }
  function polar(r,a){return {x:Math.cos(a)*r, y:Math.sin(a)*r};}
  function lerp(a,b,t){return a+(b-a)*t;}          // 线性插值


  // cA/cB 可选，不传则随机抽两队
  function newMatch(cA, cB){
    if(!cA || !cB){ const [a,b]=pickTwoCountries(); cA=a; cB=b; }
    const goalCenter = -Math.PI/2;                   // 球门固定在球场正上方
    const balls = [
      makeBall(cA, Math.random()*Math.PI*2, "#ff5a5a"),
      makeBall(cB, Math.random()*Math.PI*2, "#4aa3ff")
    ];
    return {
      countries:[cA,cB],
      balls:balls,
      goalCenter: goalCenter,
      goalFlash:0,          // 进球时门闪一下
      scoreA:0, scoreB:0,
      started:false,
      finished:false,
      // 时间：60 秒映射 0~90 分钟，线性匀速；90' 平局则加时到 120'
      realStart:0,
      realDuration:60,      // 常规时间映射秒数
      extra:false,          // 是否进入加时
      extraStart:0,         // 加时开始的真实时刻
      matchMin:0,
      prevMin:0,            // 上一帧分钟数，用于检测 45'/105' 跨越
      // 中圈开球停顿：半场/进球/加时开球/加时半场时，两球回中央并冻结 KICKOFF_PAUSE 秒
      freezeUntil:0,        // 物理冻结到的绝对时刻（<=now 表示未冻结）
      freezeStart:0,        // 本次冻结开始时刻（用于把暂停时长补回 realStart/extraStart）
      freezeMin:0,          // 冻结期间固定显示的分钟
      pendingKickoff:null,  // 进球后排队等待的中圈开球（值为开球时的分钟），下一帧处理
      rot:0                 // 外圈整体旋转角度
    };
  }

  function accel(min0, min1, k){ return min0 + (min1-min0)*Math.pow(k, P_ACCEL); }

  // 中圈开球：两球置于球场中央两侧，各自朝外侧射出
  // randomize=true（进球后重启）：两球置于随机角度（互为对侧），避免恰好对准当前旋转中的球门
  // randomize=false（开场/半场/加时开球）：两球左右并排固定位置，避免开场即进球
  function resetBallsToCenter(randomize){
    const balls = state.balls;
    const off = BALL_R + 6;                 // 两球距中心的偏移
    const baseAng = Math.random()*Math.PI*2;
    for(let i=0;i<balls.length;i++){
      const s = i===0 ? -1 : 1;             // 球0(A)在左，球1(B)在右
      let outDir;
      if(randomize){
        // 进球后：两球置于中圈随机角度（互为对侧），朝外侧射出
        const ang = baseAng + (s<0 ? 0 : Math.PI);
        balls[i].x = CX + Math.cos(ang)*off;
        balls[i].y = CY + Math.sin(ang)*off;
        outDir = ang + (Math.random()-0.5)*0.8;
      } else {
        // 开场/半场：两球左右并排固定位置（A 左 B 右），朝外侧水平射出
        balls[i].x = CX + s*off;
        balls[i].y = CY;
        outDir = (s<0 ? Math.PI : 0) + (Math.random()-0.5)*0.8;
      }
      balls[i].vx = Math.cos(outDir)*TARGET_SP;
      balls[i].vy = Math.sin(outDir)*TARGET_SP;
      balls[i].spin = 0;
      balls[i].spinV = (Math.random()-0.5)*4;
    }
  }

  // 触发中圈开球 + 停顿：两球回中央，冻结 KICKOFF_PAUSE 秒（期间时钟与物理均暂停）
  // resetRot：仅在开场时刻（开场/下半场/加时/加时下半场）复位球场朝向，进球后不复位
  function kickoffPause(min, resetRot){
    // resetRot=true（开场/半场）固定位置；resetRot falsy（进球后）随机位置
    resetBallsToCenter(!resetRot);
    if(resetRot) state.rot = 0;   // 开场：中线水平、球门回到正上方；进球后保持当前朝向继续旋转
    state.matchMin = min;
    state.freezeMin = min;
    const now = performance.now()/1000;
    state.freezeStart = now;
    state.freezeUntil = now + KICKOFF_PAUSE;
  }

  // 记分牌：用 flagcdn 图片 + 英文名
  function flagImgHTML(code, emoji){
    return `<img src="https://flagcdn.com/${code}.svg" alt="${emoji}"
              style="width:42px;height:30px;object-fit:cover;border-radius:4px;
                     box-shadow:0 2px 6px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.25)"
              onerror="this.replaceWith(document.createTextNode('${emoji}'))">`;
  }

  function applyUI(state){
    const [cA,cB]=state.countries;
    elFlagA.innerHTML=flagImgHTML(cA[1], cA[2]); elNameA.textContent=zhName(cA); elScoreA.textContent=state.scoreA;
    elFlagB.innerHTML=flagImgHTML(cB[1], cB[2]); elNameB.textContent=zhName(cB); elScoreB.textContent=state.scoreB;
  }

  // ---------- 物理更新 ----------
  function step(dt){
    if(!state || !state.started || state.finished) return;
    // 点球阶段：跑独立的点球状态机，不走常规物理/计时
    if(state.pens){ stepPens(dt); return; }

    const now = performance.now()/1000;

    // —— 中圈开球停顿期间：时钟与物理均暂停 ——
    if(state.freezeUntil){
      if(now < state.freezeUntil){
        state.matchMin = state.freezeMin;   // 时钟停在开球分钟
        return;                              // 不推进物理
      }
      // 刚解冻：把实际暂停时长补回时间基准，让比赛时钟从冻结处无缝继续（无帧漂移）
      const dur = now - state.freezeStart;
      state.realStart += dur;
      if(state.extra) state.extraStart += dur;
      state.freezeUntil = 0;
    }

    // 计时：常规 0~90'，平局则加时 90~120'
    if(!state.extra){
      let t = now - state.realStart;
      if(t >= T_REG){
        t = T_REG;
        state.matchMin = 90;
        // 常规时间结束
        if(FORCE_PENS){
          enterPens();                       // 测试开关：任何比分都直接进点球
        } else if(FORCE_EXTRA){
          state.extra = true;
          state.extraStart = now;            // 测试开关：强制进入加时
          kickoffPause(90, true);            // 加时开球 + 停顿（复位球场朝向）
          state.prevMin = 90;
          return;
        } else if(state.scoreA === state.scoreB && ALLOW_EXTRA){
          state.extra = true;
          state.extraStart = now;            // 平局 -> 加时
          kickoffPause(90, true);            // 加时开球 + 停顿（复位球场朝向）
          state.prevMin = 90;
          return;
        } else {
          state.finished = true;             // 分出胜负 / 平局且无加时（小组赛）-> 终场
        }
      } else {
        state.matchMin = accel(0, 90, t/T_REG);
      }
    } else {
      let te = now - state.extraStart;
      if(te >= T_EXTRA){
        te = T_EXTRA;
        state.matchMin = 120;
        // 加时结束：平局且允许点球 -> 点球；FORCE_PENS 亦强制点球；否则终场（含平局且无点球）
        if(FORCE_PENS){
          enterPens();
        } else if(state.scoreA === state.scoreB && ALLOW_PENS){
          enterPens();
        } else {
          state.finished = true;
        }
      } else {
        state.matchMin = accel(90, 120, te/T_EXTRA);
      }
    }

    // —— 进球后排队的开球（在物理中触发，下一帧处理，避免当帧余下子步移动刚归位的球）——
    if(state.pendingKickoff != null){
      kickoffPause(state.pendingKickoff);
      state.pendingKickoff = null;
      return;
    }
    // —— 半场 45' / 加时半场 105'：跨过即中圈开球 + 停顿 ——
    if(!state.extra){
      if(state.prevMin < 45 && state.matchMin >= 45){
        kickoffPause(45, true);              // 下半场开场（复位球场朝向）
        flashMsg("下半场", KICKOFF_PAUSE*1000);   // 停顿期间中央显示文字
        state.prevMin = 45;
        return;
      }
    } else {
      if(state.prevMin < 105 && state.matchMin >= 105){
        kickoffPause(105, true);            // 加时下半场开场（复位球场朝向）
        state.prevMin = 105;
        return;
      }
    }

    const balls = state.balls;

    // 多次小步长推进，避免高速穿墙
    const sub = 4;
    const h = dt/sub;
    for(let s=0;s<sub;s++){
      integrate(h);
      wallAndGoal();
      ballBall();
    }

    // 旋转更新
    for(const b of balls){ b.spin += b.spinV*dt; }
    if(state.goalFlash>0) state.goalFlash -= dt;

    // 外圈整体旋转：草地/中线/中圈随球场转动，球门始终固定在正上方
    state.rot += dt * 0.35;   // 弧度/秒，顺时针缓慢旋转
    state.prevMin = state.matchMin;
  }

  function integrate(h){
    for(const b of state.balls){
      b.x += b.vx*h;
      b.y += b.vy*h;
      // 保持恒定高速：把速度归一化到目标速率（方向不变，速率恒定）
      const sp = Math.hypot(b.vx,b.vy) || 1;
      b.vx = b.vx/sp*TARGET_SP;
      b.vy = b.vy/sp*TARGET_SP;
    }
  }

  function wallAndGoal(){
    // 球门跟随外圈旋转后的当前角度
    const gc = state.goalCenter + state.rot;
    const g0 = gc - GOAL_SPAN/2, g1 = gc + GOAL_SPAN/2;
    // 两根立柱的位置（圆周上门框两端）
    const posts = [
      {x: CX+Math.cos(g0)*R, y: CY+Math.sin(g0)*R},
      {x: CX+Math.cos(g1)*R, y: CY+Math.sin(g1)*R}
    ];
    const maxDist = R - BALL_R;

    for(const b of state.balls){
      // 1) 立柱碰撞 —— 碰到立柱就反弹，且不算进球（“一点都不能碰到立柱”）
      let hitPost = false;
      for(const p of posts){
        const px=b.x-p.x, py=b.y-p.y;
        const pd=Math.hypot(px,py);
        if(pd <= BALL_R && pd > 0.0001){
          const nx=px/pd, ny=py/pd;            // 法线：立柱→球心
          const dot=b.vx*nx + b.vy*ny;
          if(dot < 0){                          // 仅当朝立柱运动时反射
            b.vx -= 2*dot*nx;
            b.vy -= 2*dot*ny;
          }
          // 推离立柱表面
          b.x = p.x + nx*BALL_R;
          b.y = p.y + ny*BALL_R;
          b.spinV = (Math.random()-0.5)*8;
          hitPost = true;
        }
      }
      if(hitPost) continue;   // 本帧已碰立柱，不再判墙/进球

      const dx=b.x-CX, dy=b.y-CY;
      const dist=Math.hypot(dx,dy);
      if(dist < maxDist) continue;  // 还没碰到边界，跳过

      const ang = Math.atan2(dy,dx);
      let diff = normAngle(ang - gc);
      const inGoal = Math.abs(diff) <= GOAL_SPAN/2;

      if(inGoal){
        // 球在门框角度内、且没碰立柱 -> 整个球在门框范围内
        // 球心越过门线(半径 R)才算真正进网
        if(dist >= R){
          scoreGoal(b);
          // 进球后正常反弹回场内继续运动
          b.x = CX + Math.cos(ang)*maxDist*0.35;
          b.y = CY + Math.sin(ang)*maxDist*0.35;
          const sp = Math.hypot(b.vx,b.vy) || 480;
          b.vx = -Math.cos(ang)*sp;
          b.vy = -Math.sin(ang)*sp;
        }
        // else: 在门框内但还没越过门线 -> 不反弹，继续穿行（可能下一帧碰立柱被弹）
      } else {
        // 撞外圈反弹
        const nx=dx/dist, ny=dy/dist;
        const dot = b.vx*nx + b.vy*ny;
        b.vx -= 2*dot*nx;
        b.vy -= 2*dot*ny;
        // 推回界内
        b.x = CX + nx*maxDist;
        b.y = CY + ny*maxDist;
        // 碰墙加点随机扰动，制造“乱弹”
        const jitter = (Math.random()-0.5)*0.5;
        const cs=Math.cos(jitter), sn=Math.sin(jitter);
        const nvx=b.vx*cs - b.vy*sn, nvy=b.vx*sn + b.vy*cs;
        b.vx=nvx; b.vy=nvy;
        b.spinV = (Math.random()-0.5)*6;
      }
    }
  }

  function normAngle(a){
    while(a>Math.PI) a-=2*Math.PI;
    while(a<-Math.PI) a+=2*Math.PI;
    return a;
  }

  function ballBall(){
    const a=state.balls[0], b=state.balls[1];
    const dx=b.x-a.x, dy=b.y-a.y;
    const dist=Math.hypot(dx,dy);
    const minD = BALL_R*2;
    if(dist>0 && dist<minD){
      const nx=dx/dist, ny=dy/dist;
      // 分离
      const overlap = minD - dist;
      a.x -= nx*overlap/2; a.y -= ny*overlap/2;
      b.x += nx*overlap/2; b.y += ny*overlap/2;
      // 弹性碰撞（等质量）
      const dvx=b.vx-a.vx, dvy=b.vy-a.vy;
      const dot=dvx*nx + dvy*ny;
      if(dot<0){
        a.vx += dot*nx; a.vy += dot*ny;
        b.vx -= dot*nx; b.vy -= dot*ny;
        // 碰撞加随机扰动 -> 乱弹
        const j=(Math.random()-0.5)*0.6;
        const cs=Math.cos(j), sn=Math.sin(j);
        [a,b].forEach(o=>{
          const nvx=o.vx*cs - o.vy*sn, nvy=o.vx*sn + o.vy*cs;
          o.vx=nvx; o.vy=nvy; o.spinV=(Math.random()-0.5)*8;
        });
        // 给点能量防止停下
        const boost=1.04;
        a.vx*=boost; a.vy*=boost; b.vx*=boost; b.vy*=boost;
      }
    }
  }

  function scoreGoal(b){
    b.score++;
    if(b===state.balls[0]) state.scoreA=b.score;
    else state.scoreB=b.score;
    state.goalFlash = 0.8;
    applyUI(state);
    // 进球提示：GOAL 居中，下方显示中文队名
    elFlash.innerHTML = `GOAL!<span class="gname">${zhByCode(b.code) || b.name}</span>`;
    elFlash.classList.add("show");
    clearTimeout(state._flashTimer);
    state._flashTimer = setTimeout(()=>elFlash.classList.remove("show"), 900);
    // 进球后：球回中圈并停顿 1 秒（下一帧处理，避免当帧余下子步移动刚归位的球）
    state.pendingKickoff = state.matchMin;
  }

  function flashMsg(text, dur){
    elFlash.textContent = text;
    elFlash.classList.add("show");
    clearTimeout(state._flashTimer);
    state._flashTimer = setTimeout(()=>elFlash.classList.remove("show"), dur||900);
  }

  // ==================== 点球大战 ====================
  // 触发：120' 仍平局（或 FORCE_PENS 测试开关）。球门冻结到顶部(-π/2)，球场停止旋转，
  // 每轮：先按 0.72 概率判定进/扑出，再用物理飞行动画把结果演出来。
  // 赛制：5 轮交替 + 提前结束判定，仍平则突然死亡。

  function enterPens(){
    // 冻结旋转：令 goalCenter+rot = 顶部，且 stepPens 不再增加 rot
    state.goalCenter = PEN_GC - state.rot;
    state.pens = {
      phase:"prep", t:0,
      firstKicker: Math.random()<0.5?0:1,   // 谁先罚
      penA:0, penB:0,
      kicksA:[], kicksB:[],                  // 每罚 true=进 false=失
      kicker:0, outcome:null, made:false, ballCorner:1,
      ballStartX:CX, ballStartY:CY, ballX:CX, ballY:CY,
      ballTargetX:CX, ballTargetY:CY,
      resolveSX:CX, resolveSY:CY, resolveTX:CX, resolveTY:CY,
      keeperAngle:PEN_GC, keeperDive:PEN_GC,
      ballSpin:0, ended:false, winner:null
    };
    setupKick();
    elPensBar.style.display="flex";
    renderPensBar();
    applyPensScoreboard();
  }

  // 决定本球谁罚、判结果、算好球路与守门员扑救方向
  function setupKick(){
    const p=state.pens;
    // 该轮谁罚：两人罚数相等时由先手开轮，否则换另一队
    p.kicker = (p.kicksA.length === p.kicksB.length) ? p.firstKicker : (1 - p.firstKicker);
    // 判定结果
    p.made = Math.random() < PEN_GOAL_P;
    if(p.made) p.outcome="goal";
    else { const r=Math.random(); p.outcome = r<0.6?"save":(r<0.8?"post":"wide"); }
    p.ballCorner = Math.random()<0.5?-1:1;
    const half = GOAL_SPAN/2;
    const cornerAng = PEN_GC + p.ballCorner * half * 0.75;     // 瞄准的角
    // 守门员扑救方向：扑救则扑对边，其余扑错边（演出"赌错方向"）
    const kSign = (p.outcome==="save") ? p.ballCorner : -p.ballCorner;
    p.keeperDive = PEN_GC + kSign * half * 0.7;
    p.keeperAngle = PEN_GC;
    // 球路终点
    let tang, trad;
    if(p.outcome==="goal"){ tang=cornerAng; trad=R-6; }              // 入网
    else if(p.outcome==="save"){ tang=cornerAng; trad=R-16; }        // 到守门员处被挡
    else if(p.outcome==="post"){ tang=PEN_GC + p.ballCorner*half; trad=R-4; }  // 撞立柱
    else { tang=PEN_GC + p.ballCorner*(half+0.20); trad=R-2; }       // 偏出
    p.ballTargetX = CX + Math.cos(tang)*trad;
    p.ballTargetY = CY + Math.sin(tang)*trad;
    p.ballStartX=CX; p.ballStartY=CY;
    p.ballX=CX; p.ballY=CY; p.ballSpin=0;
    p.phase="prep"; p.t=0;
    renderPensBar();
  }

  // 球到达终点时结算这一罚
  function resolveKick(){
    const p=state.pens, team=p.kicker;
    if(team===0) p.kicksA.push(p.made); else p.kicksB.push(p.made);
    if(p.made){ if(team===0) p.penA++; else p.penB++; }
    // 提示
    if(p.made){
      elFlash.innerHTML = `GOAL!<span class="gname">${zhName(state.countries[team])}</span>`;
      elFlash.classList.add("show");
      clearTimeout(state._flashTimer);
      state._flashTimer = setTimeout(()=>elFlash.classList.remove("show"), 900);
      state.goalFlash=0.8;
    }
    else if(p.outcome==="save") flashMsg("SAVE!");
    else if(p.outcome==="post") flashMsg("中柱!");
    else flashMsg("MISS!");
    // 结算余动终点
    if(p.made){
      const a=Math.atan2(p.ballTargetY-CY, p.ballTargetX-CX);
      p.resolveTX=CX+Math.cos(a)*(R+12); p.resolveTY=CY+Math.sin(a)*(R+12);   // 继续入网
    } else if(p.outcome==="save"){
      p.resolveTX=CX; p.resolveTY=CY;                                         // 弹回
    } else if(p.outcome==="post"){
      p.resolveTX=p.ballTargetX + (p.ballCorner>0?34:-34); p.resolveTY=p.ballTargetY+24;  // 沿切线弹开
    } else { // wide
      const a=Math.atan2(p.ballTargetY-CY, p.ballTargetX-CX);
      p.resolveTX=CX+Math.cos(a)*(R+24); p.resolveTY=CY+Math.sin(a)*(R+24);   // 继续飞出
    }
    p.resolveSX=p.ballX; p.resolveSY=p.ballY;
    renderPensBar();
    applyPensScoreboard();
  }

  // 是否已分出胜负：返回胜者 0/1，否则 null
  function checkPensEnd(){
    const p=state.pens;
    const ka=p.kicksA.length, kb=p.kicksB.length;
    if(ka<=5 && kb<=5){
      const remA=5-ka, remB=5-kb;
      if(p.penA > p.penB + remB) return 0;     // B 已追不上 A
      if(p.penB > p.penA + remA) return 1;     // A 已追不上 B
      if(ka===5 && kb===5 && p.penA!==p.penB) return p.penA>p.penB?0:1;
      return null;
    }
    // 突然死亡：双方罚数相等且不等分时结束
    if(ka===kb && p.penA!==p.penB) return p.penA>p.penB?0:1;
    return null;
  }

  function finishPens(winner){
    state.pens.ended=true;
    state.pens.winner=winner;
    state.finished=true;
    renderPensBar();
    applyPensScoreboard();
  }

  // 点球阶段每帧推进
  function stepPens(dt){
    const p=state.pens;
    p.t += dt;
    p.ballSpin += dt*10;
    if(p.phase==="prep"){
      p.ballX=CX; p.ballY=CY; p.keeperAngle=PEN_GC;
      if(p.t>=PEN_PREP){ p.phase="flight"; p.t=0; }
    } else if(p.phase==="flight"){
      const k=Math.min(1, p.t/PEN_FLIGHT), e=k*k;        // ease-in，球加速飞出
      p.ballX=lerp(p.ballStartX, p.ballTargetX, e);
      p.ballY=lerp(p.ballStartY, p.ballTargetY, e);
      p.keeperAngle=lerp(PEN_GC, p.keeperDive, k);
      if(k>=1){ p.phase="resolve"; p.t=0; resolveKick(); }
    } else if(p.phase==="resolve"){
      const k=Math.min(1, p.t/PEN_RESOLVE);
      p.ballX=lerp(p.resolveSX, p.resolveTX, k);
      p.ballY=lerp(p.resolveSY, p.resolveTY, k);
      if(state.goalFlash>0) state.goalFlash-=dt;
      if(p.t>=PEN_RESOLVE){ p.phase="gap"; p.t=0; }
    } else if(p.phase==="gap"){
      if(p.t>=PEN_GAP){
        const w=checkPensEnd();
        if(w!==null){ finishPens(w); return; }
        setupKick();
      }
    }
    // 同步罚球方球的位置/旋转供绘制
    const kb=state.balls[p.kicker];
    kb.x=p.ballX; kb.y=p.ballY; kb.spin=p.ballSpin;
  }

  // 记分牌显示 常规分(点球分)
  function applyPensScoreboard(){
    if(!state.pens) return;
    elScoreA.textContent=`${state.scoreA}(${state.pens.penA})`;
    elScoreB.textContent=`${state.scoreB}(${state.pens.penB})`;
  }

  // 点球记录条
  function renderPensBar(){
    if(!state.pens) return;
    const p=state.pens;
    const rows=[
      {el:elPensRowA, kicks:p.kicksA, tot:p.penA, c:state.countries[0], idx:0},
      {el:elPensRowB, kicks:p.kicksB, tot:p.penB, c:state.countries[1], idx:1}
    ];
    rows.forEach(r=>{
      const slots=r.kicks.map(m=>`<span class="pens-slot ${m?"make":"miss"}">${m?"✓":"✗"}</span>`).join("");
      // 当前主罚方尚未踢出这一球 -> 显示一个高亮待踢槽
      const pending = (r.idx===p.kicker && !p.ended && (p.phase==="prep"||p.phase==="flight"))
        ? `<span class="pens-slot now">·</span>` : "";
      r.el.innerHTML =
        `${smallFlag(r.c[1],r.c[2])}<span class="pname">${zhName(r.c)}</span>`+
        `<span class="pens-slots">${slots}${pending}</span><span class="pens-tot" style="font-weight:800;color:var(--gold);min-width:18px;text-align:right">${r.tot}</span>`;
    });
  }

  // 守门员：球门弧上一段挡板，按 keeperAngle 滑动/扑救
  function drawKeeper(){
    const p=state.pens, rad=R-14, a=p.keeperAngle;
    ctx.save();
    ctx.translate(CX+Math.cos(a)*rad, CY+Math.sin(a)*rad);
    ctx.rotate(a+Math.PI/2);                 // 切线方向
    ctx.fillStyle="rgba(255,255,255,.9)";
    ctx.strokeStyle="#ffd34d"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.rect(-26,-6,52,12); ctx.fill(); ctx.stroke();   // 身体挡板
    ctx.beginPath(); ctx.arc(0,-12,7,0,Math.PI*2); ctx.fill();           // 头
    ctx.restore();
  }

  // ---------- 渲染 ----------
  function draw(){
    ctx.clearRect(0,0,W,H);

    // 草地背景
    const bg = ctx.createRadialGradient(CX,CY,40,CX,CY,R+30);
    bg.addColorStop(0,"#13763c");
    bg.addColorStop(1,"#06381c");
    ctx.fillStyle=bg;
    ctx.beginPath(); ctx.arc(CX,CY,R+18,0,Math.PI*2); ctx.fill();

    // 草地条纹 + 外圈线 + 中圈/中线 —— 整体绕中心旋转
    ctx.save();
    ctx.translate(CX,CY);
    ctx.rotate(state.rot);
    ctx.translate(-CX,-CY);

    // 草地条纹
    ctx.save();
    ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.clip();
    ctx.globalAlpha=0.12;
    for(let i=-R;i<R;i+=36){
      ctx.fillStyle = (i/36)%2===0 ? "#ffffff" : "#000000";
      ctx.fillRect(CX-R, CY+i, R*2, 18);
    }
    ctx.restore();

    // 外圈线
    ctx.lineWidth=4; ctx.strokeStyle="rgba(255,255,255,.85)";
    ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.stroke();

    // 中线 + 中圈
    ctx.globalAlpha=.5; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(CX,CY,60,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(CX-R,CY); ctx.lineTo(CX+R,CY); ctx.stroke();
    ctx.globalAlpha=1;

    ctx.restore();

    // 中点（不旋转，固定中心）
    ctx.fillStyle="rgba(255,255,255,.85)";
    ctx.beginPath(); ctx.arc(CX,CY,4,0,Math.PI*2); ctx.fill();

    // 球门（弧段缺口 + 门柱 + 网格）—— 跟随外圈旋转
    drawGoal(state.goalCenter + state.rot);

    // 点球阶段：画守门员 + 仅画主罚方那颗球
    if(state.pens){
      drawKeeper();
      drawBall(state.balls[state.pens.kicker]);
    } else {
      for(const b of state.balls) drawBall(b);
    }
  }

  function drawGoal(gc){
    const g0 = gc - GOAL_SPAN/2, g1 = gc + GOAL_SPAN/2;
    // 门后网格
    ctx.save();
    ctx.translate(CX,CY);
    ctx.rotate(gc);
    const depth = 26;
    // 网背景
    ctx.fillStyle="rgba(255,255,255,.10)";
    ctx.beginPath();
    ctx.moveTo(Math.cos(-GOAL_SPAN/2)*R, Math.sin(-GOAL_SPAN/2)*R);
    ctx.arc(0,0,R,-GOAL_SPAN/2, GOAL_SPAN/2);
    ctx.lineTo(Math.cos(GOAL_SPAN/2)*(R-depth), Math.sin(GOAL_SPAN/2)*(R-depth));
    ctx.arc(0,0,R-depth, GOAL_SPAN/2, -GOAL_SPAN/2, true);
    ctx.closePath();
    ctx.fill();
    // 网线
    ctx.strokeStyle="rgba(255,255,255,.35)"; ctx.lineWidth=1;
    for(let i=1;i<5;i++){
      const r = R - depth*i/5;
      ctx.beginPath(); ctx.arc(0,0,r,-GOAL_SPAN/2,GOAL_SPAN/2); ctx.stroke();
    }
    for(let i=1;i<6;i++){
      const a = -GOAL_SPAN/2 + GOAL_SPAN*i/6;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*R, Math.sin(a)*R);
      ctx.lineTo(Math.cos(a)*(R-depth), Math.sin(a)*(R-depth));
      ctx.stroke();
    }
    ctx.restore();

    // 门柱（亮色，进球时闪金）—— 弧形横梁
    const flash = state.goalFlash>0;
    ctx.strokeStyle = flash ? "#ffd34d" : "#ffffff";
    ctx.lineWidth = flash ? 8 : 6;
    ctx.shadowColor = flash ? "#ffd34d" : "rgba(0,0,0,0.6)";
    ctx.shadowBlur = flash ? 24 : 6;
    ctx.beginPath();
    ctx.arc(CX,CY,R,g0,g1);
    ctx.stroke();
    ctx.shadowBlur=0;

    // 明显的立柱 —— 球门两端的粗圆角柱子，向外突出
    const postR = 7;                  // 立柱粗细
    const postOut = 14;               // 立柱向外突出长度
    [g0, g1].forEach(a=>{
      const ix = CX + Math.cos(a)*R,          iy = CY + Math.sin(a)*R;          // 内端（弧上）
      const ox = CX + Math.cos(a)*(R+postOut), oy = CY + Math.sin(a)*(R+postOut); // 外端
      ctx.strokeStyle = flash ? "#ffd34d" : "#ffffff";
      ctx.lineCap = "round";
      ctx.lineWidth = postR*2;
      ctx.shadowColor = flash ? "#ffd34d" : "rgba(0,0,0,0.6)";
      ctx.shadowBlur = flash ? 24 : 6;
      ctx.beginPath();
      ctx.moveTo(ix, iy);
      ctx.lineTo(ox, oy);
      ctx.stroke();
    });
    ctx.shadowBlur=0;
    ctx.lineCap="butt";
  }

  function drawBall(b){
    ctx.save();
    ctx.translate(b.x,b.y);
    // 阴影
    ctx.fillStyle="rgba(0,0,0,.3)";
    ctx.beginPath(); ctx.ellipse(2,4,BALL_R,BALL_R*0.92,0,0,Math.PI*2); ctx.fill();

    // 球体
    const g = ctx.createRadialGradient(-8,-8,4,0,0,BALL_R);
    g.addColorStop(0,"#ffffff"); g.addColorStop(1,b.color);
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(0,0,BALL_R,0,Math.PI*2); ctx.fill();

    // 旋转的国旗（圆形裁剪的图片，加载前回退 emoji）
    ctx.save();
    ctx.rotate(b.spin);
    ctx.beginPath(); ctx.arc(0,0,BALL_R-4,0,Math.PI*2); ctx.clip();
    const img = getFlagImg(b.code);
    if(img.complete && img.naturalWidth>0){
      // 把国旗图 cover 进圆内
      const sz = (BALL_R-4)*2;
      const s = Math.max(sz/img.naturalWidth, sz/img.naturalHeight);
      const dw = img.naturalWidth*s, dh = img.naturalHeight*s;
      ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
    } else {
      // 还没加载：先画 emoji
      ctx.font = "bold 30px serif";
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(b.emoji, 0, 1);
    }
    ctx.restore();

    // 边框
    ctx.lineWidth=2; ctx.strokeStyle="rgba(0,0,0,.35)";
    ctx.beginPath(); ctx.arc(0,0,BALL_R,0,Math.PI*2); ctx.stroke();
    // 高光
    ctx.fillStyle="rgba(255,255,255,.35)";
    ctx.beginPath(); ctx.ellipse(-9,-10,8,5,-0.6,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ---------- 主循环 ----------
  function loop(ts){
    if(!lastT) lastT=ts;
    let dt=(ts-lastT)/1000; lastT=ts;
    if(dt>0.05) dt=0.05;     // 防卡顿大跳

    step(dt);
    draw();
    updateClock();

    if(state && state.finished){
      finishMatch();
      return;     // 停止循环
    }
    rafId=requestAnimationFrame(loop);
  }

  function updateClock(){
    if(!state) return;
    if(state.pens){
      elClock.textContent = "点球";
      elClockMax.textContent = "大战";
      elExtraTag.textContent = "";
      elBar.style.width = "100%";
      return;
    }
    const m=Math.floor(state.matchMin);
    elClock.textContent = m + "'";
    const maxMin = state.extra ? 120 : 90;
    elClockMax.textContent = "/ " + maxMin + "'";
    elExtraTag.textContent = state.extra ? "加时" : "";
    const denom = state.extra ? 120 : 90;
    elBar.style.width = (state.matchMin/denom*100).toFixed(1)+"%";
  }

  function finishMatch(){
    applyUI(state);
    // 点球大战结束
    if(state.pens){
      const a=state.scoreA, b=state.scoreB, pa=state.pens.penA, pb=state.pens.penB;
      const [cA,cB]=state.countries;
      const w=state.pens.winner;
      const title=`${state.countries[w][2]} ${zhName(state.countries[w])} 获胜（点球）`;
      elOverlayTitle.textContent="点球大战结束 ⚽";
      elOverlayBody.innerHTML =
        `<div class="final-result">
           <div class="final-team ${w===0?'winner':''}">
             ${flagImgHTML(cA[1], cA[2])}
             <div class="fname">${zhName(cA)}</div>
           </div>
           <div class="final-score">
             ${a}<span class="pen"><small>点球</small>${pa}</span>
             <span class="sep">:</span>
             ${b}<span class="pen"><small>点球</small>${pb}</span>
           </div>
           <div class="final-team ${w===1?'winner':''}">
             ${flagImgHTML(cB[1], cB[2])}
             <div class="fname">${zhName(cB)}</div>
           </div>
         </div>
         <div style="text-align:center">
           <span class="final-tag">点球 PENS</span>
         </div>
         <div class="final-winner-line">${title}</div>`;
      elStartBtn.textContent="再来一局";
      elOverlay.classList.remove("hidden");
      applyPensScoreboard();   // 记分牌保留 常规分(点球分)
      return;
    }
    const a=state.scoreA, b=state.scoreB;
    const [cA,cB]=state.countries;
    let winIdx = a>b ? 0 : (b>a ? 1 : -1);
    const tag = winIdx>=0 ? "WIN" : "DRAW";
    const title = winIdx>=0
      ? `${state.countries[winIdx][2]} ${zhName(state.countries[winIdx])} 获胜`
      : (state.extra ? "加时仍平局" : "常规时间平局");
    elOverlayTitle.textContent = state.extra ? "加时结束 ⚽" : "终场哨响 ⚽";
    elOverlayBody.innerHTML =
      `<div class="final-result">
         <div class="final-team ${winIdx===0?'winner':''}">
           ${flagImgHTML(cA[1], cA[2])}
           <div class="fname">${zhName(cA)}</div>
         </div>
         <div class="final-score">${a}<span class="sep">:</span>${b}</div>
         <div class="final-team ${winIdx===1?'winner':''}">
           ${flagImgHTML(cB[1], cB[2])}
           <div class="fname">${zhName(cB)}</div>
         </div>
       </div>
       <div style="text-align:center">
         <span class="final-tag">${tag}</span>
       </div>
       <div class="final-winner-line">${title}</div>`;
    elStartBtn.textContent="再来一局";
    elOverlay.classList.remove("hidden");
  }

  // ---------- 控制 ----------
  let pending = null;   // 已选定但尚未开战的双方 [cA, cB]

  // 选定比赛后只做预览：载入双方、显示「开始模拟」按钮，不立即开战
  function previewMatch(cA, cB){
    state = newMatch(cA, cB);
    applyUI(state);
    elPensBar.style.display="none";
    pending = [cA, cB];
    elOverlayTitle.textContent = "比赛已选定 ⚽";
    elOverlayBody.innerHTML =
      `<div style="display:flex;align-items:center;justify-content:center;gap:12px;font-size:18px;font-weight:700;flex-wrap:wrap">
         ${flagImgHTML(cA[1],cA[2])}<span>${zhName(cA)}</span>
         <span style="opacity:.5;font-size:14px;letter-spacing:2px">VS</span>
         ${flagImgHTML(cB[1],cB[2])}<span>${zhName(cB)}</span>
       </div>
       <div style="opacity:.7;font-size:13px;margin-top:6px">点击下方按钮 / 按空格键开始模拟</div>`;
    elStartBtn.textContent = "开始模拟";
    elOverlay.classList.remove("hidden");
    updateClock();   // 选定新比赛时刷新时钟/进度条，清除上一场 90'/100% 残留
    draw();
  }

  // cA/cB 可选；不传=随机。立即开战
  function start(cA, cB){
    state = newMatch(cA, cB);
    applyUI(state);
    elPensBar.style.display="none";   // 隐藏点球记录条
    elOverlay.classList.add("hidden");
    state.realStart = performance.now()/1000;
    state.started = true;
    kickoffPause(0, true);         // 开局中圈开球：球回中央 + 复位球场朝向 + 停顿 1 秒
    lastT = 0;
    if(rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  // 开始模拟：优先用已选定的两队，否则随机抽两队
  function doStart(){
    if(pending){
      const [a,b]=pending; pending=null;
      start(a, b);
    } else {
      start(null, null);
    }
  }
  elStartBtn.addEventListener("click", doStart);

  // 空格键开始模拟：仅当遮罩可见（未在比赛进行中）时生效，避免打断进行中的对局。
  // preventDefault 既阻止页面滚动，也阻止焦点按钮（开始/对阵）原生的 space-click，避免重复触发。
  window.addEventListener("keydown", (e)=>{
    if(e.code!=="Space" && e.key!==" ") return;
    if(elOverlay.classList.contains("hidden")) return;   // 比赛进行中：忽略
    e.preventDefault();
    doStart();
  });

    ]
  };

  // 对阵树显示用中文名（按 ISO 代码查表），不影响球内/记分牌的英文名
  const NAME_ZH = {
    de:"德国",py:"巴拉圭",fr:"法国",se:"瑞典",za:"南非",ca:"加拿大",
    nl:"荷兰",ma:"摩洛哥",pt:"葡萄牙",hr:"克罗地亚",es:"西班牙",at:"奥地利",
    us:"美国",ba:"波黑",be:"比利时",sn:"塞内加尔",br:"巴西",jp:"日本",
    ci:"科特迪瓦",no:"挪威",mx:"墨西哥",ec:"厄瓜多尔","gb-eng":"英格兰",
    cd:"刚果（金）",ar:"阿根廷",cv:"佛得角",au:"澳大利亚",eg:"埃及",
    ch:"瑞士",dz:"阿尔及利亚",co:"哥伦比亚",gh:"加纳"
  };
  function zhName(team){ return NAME_ZH[team[1]] || team[0]; }
  function zhByCode(code){ return NAME_ZH[code]; }

  function smallFlag(code, emoji){
    if(code==="_tbd") return `<span class="mf" style="display:inline-block;text-align:center;font-size:11px;opacity:.7">❓</span>`;
    return `<img class="mf" src="https://flagcdn.com/${code}.svg" alt="${emoji}"
            onerror="this.replaceWith(document.createTextNode('${emoji}'))">`;
  }
  function matchHTML(m){
    const aTBD = m.a[1]==="_tbd", bTBD = m.b[1]==="_tbd";
    const wa = m.winner==='a', wb = m.winner==='b';
    const clsA = aTBD ? "tbd" : (wa ? "win" : (wb ? "lose" : ""));
    const clsB = bTBD ? "tbd" : (wb ? "win" : (wa ? "lose" : ""));
    const sa = (!aTBD && m.scoreA!=null) ? (m.penA!=null ? `${m.scoreA}(${m.penA})` : m.scoreA) : "";
    const sb = (!bTBD && m.scoreB!=null) ? (m.penB!=null ? `${m.scoreB}(${m.penB})` : m.scoreB) : "";
    return `<div class="mrow ${clsA}">${smallFlag(m.a[1],m.a[2])}<span class="mn">${zhName(m.a)}</span><span class="ms">${sa}</span></div>`
         + `<div class="mrow ${clsB}">${smallFlag(m.b[1],m.b[2])}<span class="mn">${zhName(m.b)}</span><span class="ms">${sb}</span></div>`;
  }

  // 按轮次把对阵分组，渲染成树状列
  const ROUND_ORDER = ["32强赛","16强赛","1/4决赛","半决赛"];
  function renderHalf(list){
    // 分轮
    const byRound = {};
    ROUND_ORDER.forEach(r=>byRound[r]=[]);
    list.forEach(m=>{ if(byRound[m.round]) byRound[m.round].push(m); });
    let html = "";
    ROUND_ORDER.forEach((r,idx)=>{
      const last = idx===ROUND_ORDER.length-1;
      const cls = "col r"+(idx+1) + (last?"":" has-next");
      html += `<div class="${cls}">`;
      byRound[r].forEach(m=>{
        const isTBD = m.a[1]==="_tbd" || m.b[1]==="_tbd";
        if(isTBD){
          html += `<div class="match disabled">${matchHTML(m)}</div>`;
        }else{
          html += `<button class="match" data-a="${m.a[0]}|${m.a[1]}|${m.a[2]}"
                           data-b="${m.b[0]}|${m.b[1]}|${m.b[2]}">${matchHTML(m)}</button>`;
        }
      });
      html += `</div>`;
      if(!last) html += `<div class="gap"></div>`;
    });
    return html;
  }

  function renderBracket(){
    document.getElementById("bracketTop").innerHTML = renderHalf(BRACKET.top);
    document.getElementById("bracketBottom").innerHTML = renderHalf(BRACKET.bottom);
    // 两个树统一管理 active
    const all = document.querySelectorAll(".match[data-a]");
    all.forEach(el=>{
      el.addEventListener("click", ()=>{
        all.forEach(x=>x.classList.remove("active"));
        el.classList.add("active");
        const pa = el.dataset.a.split("|"), pb = el.dataset.b.split("|");
        previewMatch(pa, pb);
      });
    });
  }

  renderBracket();

  // 初始：不显示任何国家，仅绘制空球场
  state = {
    countries:[], balls:[], goalCenter: -Math.PI/2,
    goalFlash:0, scoreA:0, scoreB:0, started:false, finished:false,
    extra:false, matchMin:0, rot:0
  };
  elFlagA.textContent=""; elNameA.textContent=""; elScoreA.textContent="0";
  elFlagB.textContent=""; elNameB.textContent=""; elScoreB.textContent="0";
  draw();
})();
</script>
</body>
</html>
