<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ 世界杯小游戏</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/bracket.css">
</head>
<body>
  <h1>⚽ 世界杯小游戏</h1>
  <div class="subtitle">点「开始模拟」按钮开战；进球得分，90 分钟平局则加时至 120 分钟</div>

  <div class="layout">
    <!-- 左：上半区对阵树 -->
    <aside class="bracket-side">
      <div class="bracket-head">🏆 上半区
        <span class="bracket-sub">2026 美加墨</span>
      </div>
      <div class="bracket" id="bracketTop"></div>
    </aside>

    <!-- 中：球场 + 总决赛席位 -->
    <main class="center-panel">
      <div class="scoreboard">
        <div class="team">
          <div class="flag" id="flagA">🏳️</div>
          <div class="tname" id="nameA">A队</div>
          <div class="goals" id="scoreA">0</div>
        </div>
        <div class="center">
          <div class="vs">VS</div>
        </div>
        <div class="team">
          <div class="flag" id="flagB">🏳️</div>
          <div class="tname" id="nameB">B队</div>
          <div class="goals" id="scoreB">0</div>
        </div>
      </div>

      <div class="clock-wrap">
        <div class="clock">
          <span class="min" id="clockMin">0'</span>
          <span class="lbl" id="clockMax">/ 90'</span>
          <span class="extra-tag" id="extraTag"></span>
        </div>
        <div class="progress"><i id="progressBar"></i></div>
      </div>

      <div class="pens-bar" id="pensBar" style="display:none">
        <div class="pens-row" id="pensRowA"></div>
        <div class="pens-row" id="pensRowB"></div>
      </div>

      <div class="stage">
        <canvas id="pitch" width="640" height="640"></canvas>
        <div class="goal-flash" id="goalFlash">GOAL!</div>
        <div class="overlay" id="overlay">
          <h2 id="overlayTitle">⚽ 世界杯小游戏</h2>
          <div id="overlayBody" style="opacity:.85;font-size:14px;line-height:1.7">
            点击两侧对阵树任一场比赛即可开战<br>或点下方按钮 / 按 <b>空格键</b> 随机抽两队对战<br>进球需整球穿过门框、不碰立柱
          </div>
          <button class="btn" id="startBtn">随机开球</button>
        </div>
      </div>

      <div class="final-seat">🏆 总决赛席位</div>
      <div class="hint">物理弹球模拟 · 加速计时 · 平局加时至 120' · 空格键开始</div>
    </main>

    <!-- 右：下半区对阵树 -->
    <aside class="bracket-side">
      <div class="bracket-head">🏆 下半区
        <span class="bracket-sub">2026 美加墨</span>
      </div>
      <div class="bracket mirror" id="bracketBottom"></div>
    </aside>
  </div>
