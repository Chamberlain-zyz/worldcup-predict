<body>
  <h1>⚽ 法甲小游戏</h1>
  <div class="subtitle">点击积分榜选主客队 / 空格随机；进球得分，90 分钟平局则加时至 120 分钟</div>

  <div class="layout">
    <!-- 左：积分榜 -->
    <aside class="table-side">
      <div class="season-bar">
        <div class="table-head">🏆 Ligue 1 积分榜</div>
        <select id="seasonSel" class="season-select" title="选择赛季"></select>
      </div>
      <div class="table-hint" id="seasonSub">2025/26 赛季 · 点第一行=主队 第二行=客队 再点取消</div>
      <table class="stand" id="standTable">
        <thead>
          <tr>
            <th style="width:24px">#</th>
            <th class="left">球队</th>
            <th>赛</th>
            <th>胜</th>
            <th>平</th>
            <th>负</th>
            <th>净</th>
            <th>积</th>
          </tr>
        </thead>
        <tbody id="standBody"></tbody>
      </table>
      <div class="stand-legend">
        <span><i class="lg-dot" style="background:#4aa3ff"></i>欧冠</span>
        <span><i class="lg-dot" style="background:#e58a4a"></i>欧联/欧协</span>
        <span><i class="lg-dot" style="background:#ff5a5a"></i>降级</span>
      </div>
    </aside>

    <!-- 中：球场 + 记分牌 -->
    <main class="center-panel">
      <div class="scoreboard">
        <div class="team">
          <div class="flag" id="flagA"></div>
          <div class="tname" id="nameA">主队</div>
          <div class="goals" id="scoreA">0</div>
        </div>
        <div class="center">
          <div class="vs">VS</div>
        </div>
        <div class="team">
          <div class="flag" id="flagB"></div>
          <div class="tname" id="nameB">客队</div>
          <div class="goals" id="scoreB">0</div>
        </div>
      </div>

      <div class="clock-wrap">
        <div class="clock">
          <span class="min" id="clockMin">0'</span>
          <span class="lbl" id="clockMax">/ 90'</span>
          <span class="extra-tag" id="extraTag"></span>
        </div>
        <div class="progress"><i id="progressBar"></i></div>
      </div>

      <div class="pens-bar" id="pensBar" style="display:none">
        <div class="pens-row" id="pensRowA"></div>
        <div class="pens-row" id="pensRowB"></div>
      </div>

      <div class="stage">
        <canvas id="pitch" width="640" height="640"></canvas>
        <div class="goal-flash" id="goalFlash">GOAL!</div>
        <div class="overlay" id="overlay">
          <h2 id="overlayTitle">⚽ 法甲小游戏</h2>
          <div id="overlayBody" style="opacity:.85;font-size:14px;line-height:1.7">
            点击左侧积分榜任意两支球队<br>依次为主队 / 客队<br>或按 <b>空格键</b> 随机抽两队对战
          </div>
          <button class="btn" id="startBtn">随机开球</button>
        </div>
      </div>

      <div class="final-seat">🏆 王子公园 · 韦洛德罗姆 · 热尔兰</div>
      <div class="hint">物理弹球模拟 · 加速计时 · 平局加时至 120' · 空格键随机开始</div>
    </main>
  </div>
