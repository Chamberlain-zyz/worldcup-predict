<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ 西甲小游戏</title>
<style>
  :root{
    --pitch:#0b5d2e;
    --pitch-dark:#073d1d;
    --line:rgba(255,255,255,.85);
    --gold:#ffd34d;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Segoe UI",system-ui,"Microsoft YaHei",sans-serif;
    background:radial-gradient(circle at 50% 30%,#102a18,#04140b);
    color:#fff;
    display:flex;flex-direction:column;align-items:center;
    min-height:100vh;padding:18px 12px 30px;
    overflow-x:hidden;
  }
  h1{
    font-size:clamp(20px,3.4vw,30px);
    letter-spacing:2px;
    background:linear-gradient(90deg,var(--gold),#fff7cf,var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    margin-bottom:6px;text-shadow:0 2px 18px rgba(255,211,77,.25);
  }
  .subtitle{opacity:.7;font-size:13px;margin-bottom:14px}

  .scoreboard{
    width:min(480px,92vw);
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    background:linear-gradient(180deg,#1a3324,#0d2014);
    border:1px solid rgba(255,255,255,.12);
    border-radius:14px;padding:10px 16px;
    box-shadow:0 8px 30px rgba(0,0,0,.45);
  }
  .team{display:flex;flex-direction:column;align-items:center;min-width:120px}
  .flag{font-size:30px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));min-height:32px;display:flex;align-items:center;justify-content:center}
  .tname{font-size:13px;margin-top:3px;opacity:.92;font-weight:600}
  .goals{font-size:30px;font-weight:800;letter-spacing:1px;color:#fff;text-shadow:0 0 12px rgba(255,211,77,.5)}
  .vs{font-size:12px;opacity:.55;letter-spacing:2px}
  .center{display:flex;flex-direction:column;align-items:center;gap:2px}

  .clock-wrap{width:min(480px,92vw);margin:12px 0 4px}
  .clock{
    display:flex;align-items:baseline;justify-content:center;gap:6px;
    font-variant-numeric:tabular-nums;
  }
  .clock .min{font-size:26px;font-weight:800;color:var(--gold)}
  .clock .lbl{font-size:12px;opacity:.6}
  .progress{
    height:8px;border-radius:6px;margin-top:6px;overflow:hidden;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
  }
  .progress>i{
    display:block;height:100%;width:0%;
    background:linear-gradient(90deg,#3ddb6a,var(--gold),#ff6b4a);
    transition:width .08s linear;
  }

  .stage{position:relative;width:min(480px,92vw);aspect-ratio:1/1;margin-top:10px}
  canvas{width:100%;height:100%;display:block;border-radius:18px;
    box-shadow:0 16px 50px rgba(0,0,0,.55),inset 0 0 0 2px rgba(255,255,255,.06)}

  .overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;
    background:radial-gradient(circle at 50% 50%,rgba(4,20,11,.82),rgba(4,20,11,.95));
    border-radius:18px;text-align:center;padding:20px;
    transition:opacity .4s;backdrop-filter:blur(2px);
  }
  .overlay.hidden{opacity:0;pointer-events:none}
  .overlay h2{font-size:clamp(22px,4vw,34px);color:var(--gold)}
  .result-line{font-size:clamp(28px,6vw,46px);font-weight:800;letter-spacing:2px;
    text-shadow:0 0 22px rgba(255,211,77,.45)}
  .result-tag{font-size:14px;opacity:.8;margin-top:-6px;letter-spacing:6px}

  /* ---------- 比赛结束：结果卡片 ---------- */
  .final-result{
    display:flex;align-items:center;justify-content:center;gap:14px;
    width:100%;max-width:520px;margin:6px 0 2px;
  }
  .final-team{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    min-width:104px;padding:10px 8px;border-radius:14px;
    background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01));
    border:1px solid rgba(255,255,255,.12);
    transition:transform .25s,box-shadow .25s,border-color .25s;
  }
  .final-team.winner{
    transform:scale(1.1);
    border-color:rgba(255,211,77,.7);
    box-shadow:0 0 26px rgba(255,211,77,.45),0 0 60px rgba(255,211,77,.18);
  }
  .final-team .fbadge{width:48px;height:48px;display:flex;align-items:center;justify-content:center;
    border-radius:10px;font-size:14px;font-weight:900;letter-spacing:.5px;
    box-shadow:0 4px 12px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.25)}
  .final-team .fname{
    font-size:clamp(15px,2.4vw,20px);font-weight:800;letter-spacing:.5px;
    text-align:center;line-height:1.15;
  }
  .final-team.winner .fname{
    color:var(--gold);text-shadow:0 0 14px rgba(255,211,77,.55);
  }
  .final-score{
    font-size:clamp(46px,9vw,72px);font-weight:900;letter-spacing:2px;
    font-variant-numeric:tabular-nums;line-height:1;
    color:#fff;text-shadow:0 0 22px rgba(255,211,77,.55),0 4px 18px rgba(0,0,0,.6);
    display:flex;align-items:center;gap:10px;
  }
  .final-score .pen{
    font-size:.4em;font-weight:700;opacity:.85;color:var(--gold);
    display:flex;flex-direction:column;align-items:center;line-height:1.1;
  }
  .final-score .pen small{font-size:.62em;opacity:.7;font-weight:600;letter-spacing:1px}
  .final-tag{
    display:inline-block;margin-top:10px;padding:4px 16px;border-radius:20px;
    font-size:13px;font-weight:800;letter-spacing:4px;
    background:rgba(255,211,77,.14);border:1px solid rgba(255,211,77,.4);color:var(--gold);
  }
  .final-winner-line{
    margin-top:8px;font-size:clamp(15px,2.4vw,19px);font-weight:700;opacity:.92;
    text-align:center;
  }

  button{
    cursor:pointer;border:none;outline:none;
    font-family:inherit;font-weight:700;letter-spacing:1px;
  }
  .btn{
    background:linear-gradient(180deg,var(--gold),#f0a93a);
    color:#3a2400;padding:12px 30px;border-radius:30px;font-size:16px;
    box-shadow:0 6px 18px rgba(240,169,58,.4);transition:transform .12s,box-shadow .12s;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(240,169,58,.55)}
  .btn:active{transform:translateY(0)}

  .hint{font-size:11px;opacity:.45;margin-top:10px}

  .goal-flash{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.6);
    display:flex;flex-direction:column;align-items:center;gap:6px;
    font-size:clamp(34px,8vw,64px);font-weight:900;color:#fff;
    text-shadow:0 0 24px var(--gold),0 0 50px #ff6b4a;letter-spacing:3px;
    opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
  }
  .goal-flash.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  .goal-flash .gname{
    font-size:.42em;letter-spacing:1px;font-weight:800;color:var(--gold);
    text-shadow:0 0 14px rgba(255,211,77,.6);white-space:nowrap;
  }

  /* ---------- 布局：左积分榜 | 中球场 ---------- */
  .layout{
    display:flex;gap:16px;align-items:flex-start;justify-content:center;
    width:min(1200px,99vw);margin-top:6px;
  }
  .table-side{
    flex:0 0 380px;display:flex;flex-direction:column;
    background:linear-gradient(180deg,#15281c,#0b1810);
    border:1px solid rgba(255,255,255,.12);border-radius:14px;
    padding:12px 10px 10px;box-shadow:0 8px 30px rgba(0,0,0,.45);
  }
  .table-head{font-weight:800;font-size:14px;letter-spacing:1px;color:var(--gold);margin-bottom:2px}
  .season-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:2px}
  .season-select{
    background:linear-gradient(180deg,#1a3324,#0d2014);
    color:var(--gold);border:1px solid rgba(255,211,77,.4);
    border-radius:8px;padding:4px 8px;font-family:inherit;font-size:12px;
    font-weight:700;cursor:pointer;letter-spacing:.5px;outline:none;
  }
  .season-select:hover{border-color:var(--gold)}
  .season-select option{background:#0d2014;color:#fff}
  .table-hint{font-size:11px;opacity:.55;text-align:center;margin:6px 0 8px;letter-spacing:.5px}
  .center-panel{flex:1 1 560px;min-width:0;display:flex;flex-direction:column;align-items:center}
  .final-seat{
    margin-top:8px;font-size:12px;letter-spacing:2px;color:var(--gold);opacity:.85;
    padding:4px 14px;border:1px dashed rgba(255,211,77,.4);border-radius:20px;
  }

  /* ---------- 积分榜表格 ---------- */
  .stand{
    width:100%;border-collapse:collapse;font-size:12px;
    font-variant-numeric:tabular-nums;
  }
  .stand thead th{
    padding:5px 4px;font-weight:700;font-size:10px;letter-spacing:.5px;
    color:rgba(255,255,255,.6);border-bottom:1px solid rgba(255,255,255,.15);
    text-align:center;
  }
  .stand thead th.left{text-align:left}
  .stand tbody tr{
    border-bottom:1px solid rgba(255,255,255,.05);
    cursor:pointer;transition:background .12s;
  }
  .stand tbody tr:hover{background:rgba(255,211,77,.1)}
  .stand tbody tr.home{background:rgba(255,211,77,.22);box-shadow:inset 3px 0 0 var(--gold)}
  .stand tbody tr.away{background:rgba(74,163,255,.22);box-shadow:inset 3px 0 0 #4aa3ff}
  .stand td{padding:5px 4px;text-align:center;line-height:1.3}
  .stand td.pos{font-weight:700;opacity:.75;width:24px}
  .stand td.tm{text-align:left;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
  .stand td.tm .badge{
    display:inline-flex;align-items:center;justify-content:center;
    width:20px;height:20px;border-radius:4px;font-size:9px;font-weight:900;
    margin-right:6px;vertical-align:middle;border:1px solid rgba(255,255,255,.2);
    letter-spacing:0;
  }
  .stand td.pts{font-weight:800;color:var(--gold);width:32px}
  .stand tr.zone-ucl td.pos{color:#4aa3ff}
  .stand tr.zone-uel td.pos{color:#e58a4a}
  .stand tr.zone-relegate td.pos{color:#ff5a5a}
  .stand-legend{
    display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
    font-size:10px;opacity:.65;margin-top:8px;padding-top:6px;
    border-top:1px solid rgba(255,255,255,.08);
  }
  .stand-legend .lg-dot{
    display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:4px;
    vertical-align:middle;
  }

  /* 记分牌上的队徽（DOM 版本，与 canvas 内的球徽同源色） */
  .flag .badge-dom{
    display:inline-flex;align-items:center;justify-content:center;
    width:42px;height:30px;border-radius:4px;font-size:12px;font-weight:900;
    box-shadow:0 2px 6px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.25);
    letter-spacing:.5px;
  }

  /* 时钟加时标签 */
  .extra-tag{font-size:11px;color:#ff8a4a;margin-left:6px;font-weight:700}

  /* ---------- 点球大战记录条 ---------- */
  .pens-bar{width:min(480px,92vw);margin-top:8px;display:flex;flex-direction:column;gap:4px}
  .pens-row{display:flex;align-items:center;gap:7px;font-size:12px;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
    border-radius:8px;padding:4px 8px}
  .pens-row .pf{
    display:inline-flex;align-items:center;justify-content:center;
    width:22px;height:16px;border-radius:3px;font-size:8px;font-weight:900;
    border:1px solid rgba(255,255,255,.2);flex:0 0 auto;letter-spacing:0;
  }
  .pens-row .pname{min-width:60px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pens-slots{display:flex;gap:4px;flex:1;flex-wrap:wrap}
  .pens-slot{width:17px;height:17px;border-radius:4px;display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:800;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
  .pens-slot.make{background:rgba(61,219,106,.25);border-color:#3ddb6a;color:#3ddb6a}
  .pens-slot.miss{background:rgba(255,90,90,.2);border-color:#ff5a5a;color:#ff5a5a}
  .pens-slot.now{box-shadow:0 0 8px rgba(255,211,77,.7);border-color:var(--gold);color:var(--gold)}

  @media(max-width:900px){
    .layout{flex-direction:column;align-items:center}
    .table-side{flex:0 0 auto;width:min(560px,96vw)}
  }
</style>
</head>
<body>
  <h1>⚽ 西甲小游戏</h1>
  <div class="subtitle">点击积分榜选主客队 / 空格随机；进球得分，90 分钟平局则加时至 120 分钟</div>

  <div class="layout">
    <!-- 左：西甲积分榜 -->
    <aside class="table-side">
      <div class="season-bar">
        <div class="table-head">🏆 LaLiga 积分榜</div>
        <select id="seasonSel" class="season-select" title="选择赛季"></select>
      </div>
      <div class="table-hint" id="seasonSub">2025/26 赛季 · 点第一行=主队 第二行=客队 再点取消</div>
      <table class="stand" id="standTable">
        <thead>
          <tr>
            <th style="width:24px">#</th>
            <th class="left">球队</th>
            <th>赛</th>
            <th>胜</th>
            <th>平</th>
            <th>负</th>
            <th>净</th>
            <th>积</th>
          </tr>
        </thead>
        <tbody id="standBody"></tbody>
      </table>
      <div class="stand-legend">
        <span><i class="lg-dot" style="background:#4aa3ff"></i>欧冠</span>
        <span><i class="lg-dot" style="background:#e58a4a"></i>欧联/欧协</span>
        <span><i class="lg-dot" style="background:#ff5a5a"></i>降级</span>
      </div>
    </aside>

    <!-- 中：球场 + 记分牌 -->
    <main class="center-panel">
      <div class="scoreboard">
        <div class="team">
          <div class="flag" id="flagA"></div>
          <div class="tname" id="nameA">主队</div>
          <div class="goals" id="scoreA">0</div>
        </div>
        <div class="center">
          <div class="vs">VS</div>
        </div>
        <div class="team">
          <div class="flag" id="flagB"></div>
          <div class="tname" id="nameB">客队</div>
          <div class="goals" id="scoreB">0</div>
        </div>
      </div>

      <div class="clock-wrap">
        <div class="clock">
          <span class="min" id="clockMin">0'</span>
          <span class="lbl" id="clockMax">/ 90'</span>
          <span class="extra-tag" id="extraTag"></span>
        </div>
        <div class="progress"><i id="progressBar"></i></div>
      </div>

      <div class="pens-bar" id="pensBar" style="display:none">
        <div class="pens-row" id="pensRowA"></div>
        <div class="pens-row" id="pensRowB"></div>
      </div>

      <div class="stage">
        <canvas id="pitch" width="640" height="640"></canvas>
        <div class="goal-flash" id="goalFlash">GOAL!</div>
        <div class="overlay" id="overlay">
          <h2 id="overlayTitle">⚽ 西甲小游戏</h2>
          <div id="overlayBody" style="opacity:.85;font-size:14px;line-height:1.7">
            点击左侧积分榜任意两支球队<br>依次为主队 / 客队<br>或按 <b>空格键</b> 随机抽两队对战
          </div>
          <button class="btn" id="startBtn">随机开球</button>
        </div>
      </div>

      <div class="final-seat">🏆 圣地亚哥·伯纳乌 · 卡尔德隆 · 诺坎普</div>
      <div class="hint">物理弹球模拟 · 加速计时 · 平局加时至 120' · 空格键随机开始</div>
    </main>
  </div>

<script>
(function(){
  "use strict";

  // ---------- 球队元数据（跨赛季共享：名称 / 配色 / 缩写）----------
  const CLUBS = {
    bar:{short:"Barcelona",    zh:"巴塞罗那",     c1:"#a50044", c2:"#004d98", abbr:"FCB"},
    rma:{short:"Real Madrid",  zh:"皇家马德里",   c1:"#ffffff", c2:"#00529f", abbr:"RMA"},
    atm:{short:"Atlético",     zh:"马德里竞技",   c1:"#cb3524", c2:"#272e61", abbr:"ATM"},
    ath:{short:"Athletic",     zh:"毕尔巴鄂",     c1:"#ee2523", c2:"#ffffff", abbr:"ATH"},
    vil:{short:"Villarreal",   zh:"比利亚雷亚尔", c1:"#ffe667", c2:"#005187", abbr:"VIL"},
    bet:{short:"Real Betis",   zh:"皇家贝蒂斯",   c1:"#0bb363", c2:"#ffffff", abbr:"BET"},
    cel:{short:"Celta Vigo",   zh:"塞尔塔",       c1:"#8ac4ea", c2:"#ffffff", abbr:"CEL"},
    ray:{short:"Rayo",         zh:"巴列卡诺",     c1:"#ffffff", c2:"#e53027", abbr:"RAY"},
    osa:{short:"Osasuna",      zh:"奥萨苏纳",     c1:"#d81920", c2:"#001e62", abbr:"OSA"},
    mlc:{short:"Mallorca",     zh:"马略卡",       c1:"#cc0000", c2:"#ffcd00", abbr:"MLC"},
    rso:{short:"Real Sociedad",zh:"皇家社会",     c1:"#003c93", c2:"#ffffff", abbr:"RSO"},
    val:{short:"Valencia",     zh:"瓦伦西亚",     c1:"#ee3524", c2:"#ffdd00", abbr:"VAL"},
    get:{short:"Getafe",       zh:"赫塔菲",       c1:"#005cb9", c2:"#ffffff", abbr:"GET"},
    esp:{short:"Espanyol",     zh:"西班牙人",     c1:"#007fc8", c2:"#ffffff", abbr:"ESP"},
    ala:{short:"Alavés",       zh:"阿拉维斯",     c1:"#005bab", c2:"#ffffff", abbr:"ALA"},
    gir:{short:"Girona",       zh:"赫罗纳",       c1:"#d51e1e", c2:"#f6d100", abbr:"GIR"},
    sev:{short:"Sevilla",      zh:"塞维利亚",     c1:"#ffffff", c2:"#d70022", abbr:"SEV"},
    elc:{short:"Elche",        zh:"埃尔切",       c1:"#009c46", c2:"#ffffff", abbr:"ELC"},
    lev:{short:"Levante",      zh:"莱万特",       c1:"#a4123f", c2:"#003a70", abbr:"LEV"},
    ovi:{short:"Real Oviedo",  zh:"奥维耶多",     c1:"#0053a0", c2:"#ffffff", abbr:"OVI"},
    leg:{short:"Leganés",      zh:"莱加内斯",     c1:"#1a3a8f", c2:"#ffffff", abbr:"LEG"},
    lpa:{short:"Las Palmas",   zh:"拉斯帕尔马斯", c1:"#00529f", c2:"#ffdd00", abbr:"LPA"},
    vld:{short:"Valladolid",   zh:"巴拉多利德",   c1:"#6c1d45", c2:"#ffffff", abbr:"VLD"},
    cad:{short:"Cádiz",        zh:"加的斯",       c1:"#ffdd00", c2:"#0033a0", abbr:"CAD"},
    alm:{short:"Almería",      zh:"阿尔梅里亚",   c1:"#d4001f", c2:"#ffffff", abbr:"ALM"},
    gra:{short:"Granada",      zh:"格拉纳达",     c1:"#ffffff", c2:"#a4001f", abbr:"GRA"}
  };

  // ---------- 最近 5 个赛季最终积分榜（按名次排序，用 code 关联 CLUBS）----------
  // 数据源：Wikipedia 2021-22 ~ 2025-26 La Liga
  const SEASONS = [
    {label:"2025/26", clubs:[
      {code:"bar",pld:38,w:31,d:1,l:6,gf:95,ga:36,pts:94},
      {code:"rma",pld:38,w:27,d:5,l:6,gf:77,ga:35,pts:86},
      {code:"vil",pld:38,w:22,d:6,l:10,gf:72,ga:46,pts:72},
      {code:"atm",pld:38,w:21,d:6,l:11,gf:62,ga:44,pts:69},
      {code:"bet",pld:38,w:15,d:15,l:8,gf:59,ga:48,pts:60},
      {code:"cel",pld:38,w:14,d:12,l:12,gf:53,ga:48,pts:54},
      {code:"get",pld:38,w:15,d:6,l:17,gf:32,ga:38,pts:51},
      {code:"ray",pld:38,w:12,d:14,l:12,gf:41,ga:44,pts:50},
      {code:"val",pld:38,w:13,d:10,l:15,gf:46,ga:55,pts:49},
      {code:"rso",pld:38,w:11,d:13,l:14,gf:59,ga:61,pts:46},
      {code:"esp",pld:38,w:12,d:10,l:16,gf:43,ga:55,pts:46},
      {code:"ath",pld:38,w:13,d:6,l:19,gf:43,ga:58,pts:45},
      {code:"sev",pld:38,w:12,d:7,l:19,gf:46,ga:60,pts:43},
      {code:"ala",pld:38,w:11,d:10,l:17,gf:44,ga:56,pts:43},

  // canvas 版：圆内画一个圆角矩形色块 + 白色 3 字母缩写（旋转跟随 ball.spin）
  function drawBadgeToCanvas(team, size){
    // 底色矩形
    const w=size*2, h=size*1.4;
    // 圆角矩形
    const rx=6;
    ctx.fillStyle = team.c1;
    roundRect(ctx, -w/2, -h/2, w, h, rx);
    ctx.fill();
    // 中间横条（次色）
    ctx.fillStyle = team.c2;
    ctx.fillRect(-w/2, -h*0.15, w, h*0.30);
    // 缩写文字
    // 若主色是白/黄一类浅色，字用次色；否则用白色
    const light = isLight(team.c1);
    ctx.fillStyle = light ? team.c2 : "#ffffff";
    ctx.strokeStyle = light ? "rgba(0,0,0,.4)" : "rgba(0,0,0,.6)";
    ctx.lineWidth = 1.2;
    ctx.font = "900 " + Math.round(size*0.55) + "px 'Segoe UI',system-ui,sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.strokeText(team.abbr, 0, 1);
    ctx.fillText(team.abbr, 0, 1);
    // 描边
    ctx.strokeStyle="rgba(0,0,0,.4)"; ctx.lineWidth=1.5;
    roundRect(ctx, -w/2, -h/2, w, h, rx);
    ctx.stroke();
  }
  function roundRect(c,x,y,w,h,r){
    c.beginPath();
    c.moveTo(x+r,y);
    c.arcTo(x+w,y,x+w,y+h,r);
    c.arcTo(x+w,y+h,x,y+h,r);
    c.arcTo(x,y+h,x,y,r);
    c.arcTo(x,y,x+w,y,r);
    c.closePath();
  }
  function isLight(hex){
    // #rgb / #rrggbb -> brightness
    const c = hex.replace("#","");
    const r=parseInt(c.length===3?c[0]+c[0]:c.slice(0,2),16);
    const g=parseInt(c.length===3?c[1]+c[1]:c.slice(2,4),16);
    const b=parseInt(c.length===3?c[2]+c[2]:c.slice(4,6),16);
    return (0.299*r+0.587*g+0.114*b) > 180;
  }

    return `<span class="${cls||"badge"}" style="${style}">${team.abbr}</span>`;
  }

  function makeBall(team, angleStart, isHome){
    const pos = polar(R*0.55, angleStart);
    const speed = 480;
    const dir = angleStart + Math.PI + (Math.random()-0.5)*1.2;
    return {
      name: team.short,
      zh: team.zh,
      team: team,                 // 关联到 TEAMS 对象
      color: isHome ? "#ff5a5a" : "#4aa3ff",
      x: CX + pos.x, y: CY + pos.y,
      vx: Math.cos(dir)*speed,
      vy: Math.sin(dir)*speed,
      spin: 0,
      spinV: (Math.random()-0.5)*4,
      score: 0
    };
  }
  function polar(r,a){return {x:Math.cos(a)*r, y:Math.sin(a)*r};}
  function lerp(a,b,t){return a+(b-a)*t;}

  function pickTwoTeams(){
    const pool = TEAMS.slice();
    const i = Math.floor(Math.random()*pool.length);
    const a = pool.splice(i,1)[0];
    const j = Math.floor(Math.random()*pool.length);
    const b = pool.splice(j,1)[0];
    return [a,b];
  }

  // tA/tB 可选，不传则随机抽两队
  function newMatch(tA, tB){
    if(!tA || !tB){ const [a,b]=pickTwoTeams(); tA=a; tB=b; }
    const goalCenter = -Math.PI/2;
    const balls = [
      makeBall(tA, Math.random()*Math.PI*2, true),
      makeBall(tB, Math.random()*Math.PI*2, false)

    return {
      teams:[tA,tB],
      balls:balls,
      goalCenter: goalCenter,
      goalFlash:0,
      scoreA:0, scoreB:0,
      started:false,
      finished:false,
      realStart:0,
      realDuration:60,
      extra:false,
      extraStart:0,
      matchMin:0,
      prevMin:0,
      freezeUntil:0,
      freezeStart:0,
      freezeMin:0,
      pendingKickoff:null,
      rot:0

  function accel(min0, min1, k){ return min0 + (min1-min0)*Math.pow(k, P_ACCEL); }

  function resetBallsToCenter(randomize){
    const balls = state.balls;
    const off = BALL_R + 6;
    const baseAng = Math.random()*Math.PI*2;
    for(let i=0;i<balls.length;i++){
      const s = i===0 ? -1 : 1;
      let outDir;
      if(randomize){
        const ang = baseAng + (s<0 ? 0 : Math.PI);
        balls[i].x = CX + Math.cos(ang)*off;
        balls[i].y = CY + Math.sin(ang)*off;
        outDir = ang + (Math.random()-0.5)*0.8;
      } else {
        balls[i].x = CX + s*off;
        balls[i].y = CY;
        outDir = (s<0 ? Math.PI : 0) + (Math.random()-0.5)*0.8;
      }
      balls[i].vx = Math.cos(outDir)*TARGET_SP;
      balls[i].vy = Math.sin(outDir)*TARGET_SP;
      balls[i].spin = 0;
      balls[i].spinV = (Math.random()-0.5)*4;
    }
  }

  function kickoffPause(min, resetRot){
    resetBallsToCenter(!resetRot);

  // ---------- 物理更新 ----------
  function step(dt){
    if(!state || !state.started || state.finished) return;
    if(state.pens){ stepPens(dt); return; }

    const now = performance.now()/1000;

    if(state.freezeUntil){
      if(now < state.freezeUntil){
        state.matchMin = state.freezeMin;
        return;
      }
      const dur = now - state.freezeStart;
      state.realStart += dur;
      if(state.extra) state.extraStart += dur;
      state.freezeUntil = 0;
    }

    if(!state.extra){
      let t = now - state.realStart;
      if(t >= T_REG){
        t = T_REG;
        state.matchMin = 90;
        if(FORCE_PENS){
          enterPens();
        } else if(FORCE_EXTRA){
          state.extra = true;
          state.extraStart = now;
          kickoffPause(90, true);
          state.prevMin = 90;
          return;
        } else if(state.scoreA === state.scoreB && ALLOW_EXTRA){
          state.extra = true;
          state.extraStart = now;
          kickoffPause(90, true);
          state.prevMin = 90;
          return;
        } else {
          state.finished = true;
        }
      } else {
        state.matchMin = accel(0, 90, t/T_REG);
      }
    } else {
      let te = now - state.extraStart;
      if(te >= T_EXTRA){
        te = T_EXTRA;
        state.matchMin = 120;
        if(FORCE_PENS){
          enterPens();
        } else if(state.scoreA === state.scoreB && ALLOW_PENS){
          enterPens();
        } else {
          state.finished = true;
        }
      } else {
        state.matchMin = accel(90, 120, te/T_EXTRA);
      }
    }

    if(state.pendingKickoff != null){
      kickoffPause(state.pendingKickoff);
      state.pendingKickoff = null;
      return;
    }
    if(!state.extra){
      if(state.prevMin < 45 && state.matchMin >= 45){
        kickoffPause(45, true);
        flashMsg("下半场", KICKOFF_PAUSE*1000);
        state.prevMin = 45;
        return;
      }
    } else {
      if(state.prevMin < 105 && state.matchMin >= 105){
        kickoffPause(105, true);
        state.prevMin = 105;
        return;
      }
    }

    const balls = state.balls;
    const sub = 4;
    const h = dt/sub;
    for(let s=0;s<sub;s++){
      integrate(h);
      wallAndGoal();
      ballBall();
    }

    for(const b of balls){ b.spin += b.spinV*dt; }
    if(state.goalFlash>0) state.goalFlash -= dt;

    state.rot += dt * 0.35;
    state.prevMin = state.matchMin;
  }

  function integrate(h){
    for(const b of state.balls){
      b.x += b.vx*h;
      b.y += b.vy*h;
      const sp = Math.hypot(b.vx,b.vy) || 1;
      b.vx = b.vx/sp*TARGET_SP;
      b.vy = b.vy/sp*TARGET_SP;
    }
  }

  function wallAndGoal(){
    const gc = state.goalCenter + state.rot;
    const g0 = gc - GOAL_SPAN/2, g1 = gc + GOAL_SPAN/2;
    const posts = [
      {x: CX+Math.cos(g0)*R, y: CY+Math.sin(g0)*R},
      {x: CX+Math.cos(g1)*R, y: CY+Math.sin(g1)*R}
    ];
    const maxDist = R - BALL_R;

    for(const b of state.balls){
      let hitPost = false;
      for(const p of posts){
        const px=b.x-p.x, py=b.y-p.y;
        const pd=Math.hypot(px,py);
        if(pd <= BALL_R && pd > 0.0001){
          const nx=px/pd, ny=py/pd;
          const dot=b.vx*nx + b.vy*ny;
          if(dot < 0){
            b.vx -= 2*dot*nx;
            b.vy -= 2*dot*ny;
          }
          b.x = p.x + nx*BALL_R;
          b.y = p.y + ny*BALL_R;
          b.spinV = (Math.random()-0.5)*8;
          hitPost = true;
        }
      }
      if(hitPost) continue;

      const dx=b.x-CX, dy=b.y-CY;
      const dist=Math.hypot(dx,dy);
      if(dist < maxDist) continue;

      const ang = Math.atan2(dy,dx);
      let diff = normAngle(ang - gc);
      const inGoal = Math.abs(diff) <= GOAL_SPAN/2;

      if(inGoal){
        if(dist >= R){
          scoreGoal(b);
          b.x = CX + Math.cos(ang)*maxDist*0.35;
          b.y = CY + Math.sin(ang)*maxDist*0.35;
          const sp = Math.hypot(b.vx,b.vy) || 480;
          b.vx = -Math.cos(ang)*sp;
          b.vy = -Math.sin(ang)*sp;
        }
      } else {
        const nx=dx/dist, ny=dy/dist;
        const dot = b.vx*nx + b.vy*ny;
        b.vx -= 2*dot*nx;
        b.vy -= 2*dot*ny;
        b.x = CX + nx*maxDist;
        b.y = CY + ny*maxDist;
        const jitter = (Math.random()-0.5)*0.5;
        const cs=Math.cos(jitter), sn=Math.sin(jitter);
        const nvx=b.vx*cs - b.vy*sn, nvy=b.vx*sn + b.vy*cs;
        b.vx=nvx; b.vy=nvy;
        b.spinV = (Math.random()-0.5)*6;
      }
    }
  }

  function normAngle(a){
    while(a>Math.PI) a-=2*Math.PI;
    while(a<-Math.PI) a+=2*Math.PI;
    return a;
  }

  function ballBall(){
    const a=state.balls[0], b=state.balls[1];
    const dx=b.x-a.x, dy=b.y-a.y;
    const dist=Math.hypot(dx,dy);
    const minD = BALL_R*2;
    if(dist>0 && dist<minD){
      const nx=dx/dist, ny=dy/dist;
      const overlap = minD - dist;
      a.x -= nx*overlap/2; a.y -= ny*overlap/2;
      b.x += nx*overlap/2; b.y += ny*overlap/2;
      const dvx=b.vx-a.vx, dvy=b.vy-a.vy;
      const dot=dvx*nx + dvy*ny;
      if(dot<0){
        a.vx += dot*nx; a.vy += dot*ny;
        b.vx -= dot*nx; b.vy -= dot*ny;
        const j=(Math.random()-0.5)*0.6;
        const cs=Math.cos(j), sn=Math.sin(j);
        [a,b].forEach(o=>{
          const nvx=o.vx*cs - o.vy*sn, nvy=o.vx*sn + o.vy*cs;
          o.vx=nvx; o.vy=nvy; o.spinV=(Math.random()-0.5)*8;
        });
        const boost=1.04;
        a.vx*=boost; a.vy*=boost; b.vx*=boost; b.vy*=boost;
      }
    }
  }

  function scoreGoal(b){
    b.score++;
    if(b===state.balls[0]) state.scoreA=b.score;
    else state.scoreB=b.score;
    state.goalFlash = 0.8;
    applyUI(state);
    elFlash.innerHTML = `GOAL!<span class="gname">${b.zh}</span>`;
    elFlash.classList.add("show");
    clearTimeout(state._flashTimer);
    state._flashTimer = setTimeout(()=>elFlash.classList.remove("show"), 900);
    state.pendingKickoff = state.matchMin;
  }

  function flashMsg(text, dur){
    elFlash.textContent = text;
    elFlash.classList.add("show");
    clearTimeout(state._flashTimer);
    state._flashTimer = setTimeout(()=>elFlash.classList.remove("show"), dur||900);
  }

  // ==================== 点球大战 ====================
  function enterPens(){
    state.goalCenter = PEN_GC - state.rot;
    state.pens = {
      phase:"prep", t:0,
      firstKicker: Math.random()<0.5?0:1,
      penA:0, penB:0,
      kicksA:[], kicksB:[],
      kicker:0, outcome:null, made:false, ballCorner:1,
      ballStartX:CX, ballStartY:CY, ballX:CX, ballY:CY,
      ballTargetX:CX, ballTargetY:CY,
      resolveSX:CX, resolveSY:CY, resolveTX:CX, resolveTY:CY,
      keeperAngle:PEN_GC, keeperDive:PEN_GC,
      ballSpin:0, ended:false, winner:null
    };
    setupKick();
    elPensBar.style.display="flex";
    renderPensBar();
    applyPensScoreboard();
  }

  function setupKick(){
    const p=state.pens;
    p.kicker = (p.kicksA.length === p.kicksB.length) ? p.firstKicker : (1 - p.firstKicker);
    p.made = Math.random() < PEN_GOAL_P;
    if(p.made) p.outcome="goal";
    else { const r=Math.random(); p.outcome = r<0.6?"save":(r<0.8?"post":"wide"); }
    p.ballCorner = Math.random()<0.5?-1:1;
    const half = GOAL_SPAN/2;
    const cornerAng = PEN_GC + p.ballCorner * half * 0.75;
    const kSign = (p.outcome==="save") ? p.ballCorner : -p.ballCorner;
    p.keeperDive = PEN_GC + kSign * half * 0.7;
    p.keeperAngle = PEN_GC;
    let tang, trad;
    if(p.outcome==="goal"){ tang=cornerAng; trad=R-6; }
    else if(p.outcome==="save"){ tang=cornerAng; trad=R-16; }
    else if(p.outcome==="post"){ tang=PEN_GC + p.ballCorner*half; trad=R-4; }
    else { tang=PEN_GC + p.ballCorner*(half+0.20); trad=R-2; }
    p.ballTargetX = CX + Math.cos(tang)*trad;
    p.ballTargetY = CY + Math.sin(tang)*trad;
    p.ballStartX=CX; p.ballStartY=CY;
    p.ballX=CX; p.ballY=CY; p.ballSpin=0;
    p.phase="prep"; p.t=0;
    renderPensBar();
  }

  function resolveKick(){
    const p=state.pens, team=p.kicker;
    if(team===0) p.kicksA.push(p.made); else p.kicksB.push(p.made);
    if(p.made){ if(team===0) p.penA++; else p.penB++; }
    if(p.made){
      elFlash.innerHTML = `GOAL!<span class="gname">${state.teams[team].zh}</span>`;
      elFlash.classList.add("show");
      clearTimeout(state._flashTimer);
      state._flashTimer = setTimeout(()=>elFlash.classList.remove("show"), 900);
      state.goalFlash=0.8;
    }
    else if(p.outcome==="save") flashMsg("SAVE!");
    else if(p.outcome==="post") flashMsg("中柱!");
    else flashMsg("MISS!");
    if(p.made){
      const a=Math.atan2(p.ballTargetY-CY, p.ballTargetX-CX);
      p.resolveTX=CX+Math.cos(a)*(R+12); p.resolveTY=CY+Math.sin(a)*(R+12);
    } else if(p.outcome==="save"){
      p.resolveTX=CX; p.resolveTY=CY;
    } else if(p.outcome==="post"){
      p.resolveTX=p.ballTargetX + (p.ballCorner>0?34:-34); p.resolveTY=p.ballTargetY+24;
    } else {
      const a=Math.atan2(p.ballTargetY-CY, p.ballTargetX-CX);
      p.resolveTX=CX+Math.cos(a)*(R+24); p.resolveTY=CY+Math.sin(a)*(R+24);
    }
    p.resolveSX=p.ballX; p.resolveSY=p.ballY;
    renderPensBar();
    applyPensScoreboard();
  }

  function checkPensEnd(){
    const p=state.pens;
    const ka=p.kicksA.length, kb=p.kicksB.length;
    if(ka<=5 && kb<=5){
      const remA=5-ka, remB=5-kb;
      if(p.penA > p.penB + remB) return 0;
      if(p.penB > p.penA + remA) return 1;
      if(ka===5 && kb===5 && p.penA!==p.penB) return p.penA>p.penB?0:1;
      return null;
    }
    if(ka===kb && p.penA!==p.penB) return p.penA>p.penB?0:1;
    return null;
  }

  function finishPens(winner){
    state.pens.ended=true;
    state.pens.winner=winner;
    state.finished=true;
    renderPensBar();
    applyPensScoreboard();
  }

  function stepPens(dt){
    const p=state.pens;
    p.t += dt;
    p.ballSpin += dt*10;
    if(p.phase==="prep"){
      p.ballX=CX; p.ballY=CY; p.keeperAngle=PEN_GC;
      if(p.t>=PEN_PREP){ p.phase="flight"; p.t=0; }
    } else if(p.phase==="flight"){
      const k=Math.min(1, p.t/PEN_FLIGHT), e=k*k;
      p.ballX=lerp(p.ballStartX, p.ballTargetX, e);
      p.ballY=lerp(p.ballStartY, p.ballTargetY, e);
      p.keeperAngle=lerp(PEN_GC, p.keeperDive, k);
      if(k>=1){ p.phase="resolve"; p.t=0; resolveKick(); }
    } else if(p.phase==="resolve"){
      const k=Math.min(1, p.t/PEN_RESOLVE);
      p.ballX=lerp(p.resolveSX, p.resolveTX, k);
      p.ballY=lerp(p.resolveSY, p.resolveTY, k);
      if(state.goalFlash>0) state.goalFlash-=dt;
      if(p.t>=PEN_RESOLVE){ p.phase="gap"; p.t=0; }
    } else if(p.phase==="gap"){
      if(p.t>=PEN_GAP){
        const w=checkPensEnd();
        if(w!==null){ finishPens(w); return; }
        setupKick();
      }
    }
    const kb=state.balls[p.kicker];
    kb.x=p.ballX; kb.y=p.ballY; kb.spin=p.ballSpin;
  }

  function applyPensScoreboard(){
    if(!state.pens) return;
    elScoreA.textContent=`${state.scoreA}(${state.pens.penA})`;
    elScoreB.textContent=`${state.scoreB}(${state.pens.penB})`;
  }

  function renderPensBar(){
    if(!state.pens) return;
    const p=state.pens;
    const rows=[
      {el:elPensRowA, kicks:p.kicksA, tot:p.penA, t:state.teams[0], idx:0},
      {el:elPensRowB, kicks:p.kicksB, tot:p.penB, t:state.teams[1], idx:1}
    ];
    rows.forEach(r=>{
      const slots=r.kicks.map(m=>`<span class="pens-slot ${m?"make":"miss"}">${m?"✓":"✗"}</span>`).join("");
      const pending = (r.idx===p.kicker && !p.ended && (p.phase==="prep"||p.phase==="flight"))
        ? `<span class="pens-slot now">·</span>` : "";
      r.el.innerHTML =
        `${badgeDomHTML(r.t, 0, "pf")}<span class="pname">${r.t.zh}</span>`+
        `<span class="pens-slots">${slots}${pending}</span><span class="pens-tot" style="font-weight:800;color:var(--gold);min-width:18px;text-align:right">${r.tot}</span>`;
    });
  }

  function drawKeeper(){
    const p=state.pens, rad=R-14, a=p.keeperAngle;
    ctx.save();
    ctx.translate(CX+Math.cos(a)*rad, CY+Math.sin(a)*rad);
    ctx.rotate(a+Math.PI/2);
    ctx.fillStyle="rgba(255,255,255,.9)";
    ctx.strokeStyle="#ffd34d"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.rect(-26,-6,52,12); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(0,-12,7,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ---------- 渲染 ----------
  function draw(){
    ctx.clearRect(0,0,W,H);

    const bg = ctx.createRadialGradient(CX,CY,40,CX,CY,R+30);
    bg.addColorStop(0,"#13763c");
    bg.addColorStop(1,"#06381c");
    ctx.fillStyle=bg;
    ctx.beginPath(); ctx.arc(CX,CY,R+18,0,Math.PI*2); ctx.fill();

    ctx.save();
    ctx.translate(CX,CY);
    ctx.rotate(state.rot);
    ctx.translate(-CX,-CY);

    ctx.save();
    ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.clip();
    ctx.globalAlpha=0.12;
    for(let i=-R;i<R;i+=36){
      ctx.fillStyle = (i/36)%2===0 ? "#ffffff" : "#000000";
      ctx.fillRect(CX-R, CY+i, R*2, 18);
    }
    ctx.restore();

    ctx.lineWidth=4; ctx.strokeStyle="rgba(255,255,255,.85)";
    ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.stroke();

    ctx.globalAlpha=.5; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(CX,CY,60,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(CX-R,CY); ctx.lineTo(CX+R,CY); ctx.stroke();
    ctx.globalAlpha=1;

    ctx.restore();

    ctx.fillStyle="rgba(255,255,255,.85)";
    ctx.beginPath(); ctx.arc(CX,CY,4,0,Math.PI*2); ctx.fill();

    drawGoal(state.goalCenter + state.rot);

    if(state.pens){
      drawKeeper();
      drawBall(state.balls[state.pens.kicker]);
    } else {
      for(const b of state.balls) drawBall(b);
    }
  }

  function drawGoal(gc){
    const g0 = gc - GOAL_SPAN/2, g1 = gc + GOAL_SPAN/2;
    ctx.save();
    ctx.translate(CX,CY);
    ctx.rotate(gc);
    const depth = 26;
    ctx.fillStyle="rgba(255,255,255,.10)";
    ctx.beginPath();
    ctx.moveTo(Math.cos(-GOAL_SPAN/2)*R, Math.sin(-GOAL_SPAN/2)*R);
    ctx.arc(0,0,R,-GOAL_SPAN/2, GOAL_SPAN/2);
    ctx.lineTo(Math.cos(GOAL_SPAN/2)*(R-depth), Math.sin(GOAL_SPAN/2)*(R-depth));
    ctx.arc(0,0,R-depth, GOAL_SPAN/2, -GOAL_SPAN/2, true);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle="rgba(255,255,255,.35)"; ctx.lineWidth=1;
    for(let i=1;i<5;i++){
      const r = R - depth*i/5;
      ctx.beginPath(); ctx.arc(0,0,r,-GOAL_SPAN/2,GOAL_SPAN/2); ctx.stroke();
    }
    for(let i=1;i<6;i++){
      const a = -GOAL_SPAN/2 + GOAL_SPAN*i/6;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*R, Math.sin(a)*R);
      ctx.lineTo(Math.cos(a)*(R-depth), Math.sin(a)*(R-depth));
      ctx.stroke();
    }
    ctx.restore();

    const flash = state.goalFlash>0;
    ctx.strokeStyle = flash ? "#ffd34d" : "#ffffff";
    ctx.lineWidth = flash ? 8 : 6;
    ctx.shadowColor = flash ? "#ffd34d" : "rgba(0,0,0,0.6)";
    ctx.shadowBlur = flash ? 24 : 6;
    ctx.beginPath();
    ctx.arc(CX,CY,R,g0,g1);
    ctx.stroke();
    ctx.shadowBlur=0;

    const postR = 7;
    const postOut = 14;
    [g0, g1].forEach(a=>{
      const ix = CX + Math.cos(a)*R,          iy = CY + Math.sin(a)*R;
      const ox = CX + Math.cos(a)*(R+postOut), oy = CY + Math.sin(a)*(R+postOut);
      ctx.strokeStyle = flash ? "#ffd34d" : "#ffffff";
      ctx.lineCap = "round";
      ctx.lineWidth = postR*2;
      ctx.shadowColor = flash ? "#ffd34d" : "rgba(0,0,0,0.6)";
      ctx.shadowBlur = flash ? 24 : 6;
      ctx.beginPath();
      ctx.moveTo(ix, iy);
      ctx.lineTo(ox, oy);
      ctx.stroke();
    });
    ctx.shadowBlur=0;
    ctx.lineCap="butt";
  }

  function drawBall(b){
    ctx.save();
    ctx.translate(b.x,b.y);
    // 阴影
    ctx.fillStyle="rgba(0,0,0,.3)";
    ctx.beginPath(); ctx.ellipse(2,4,BALL_R,BALL_R*0.92,0,0,Math.PI*2); ctx.fill();

    // 球体（用队伍主色渐变）
    const g = ctx.createRadialGradient(-8,-8,4,0,0,BALL_R);
    g.addColorStop(0,"#ffffff"); g.addColorStop(1,b.color);
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(0,0,BALL_R,0,Math.PI*2); ctx.fill();

    // 旋转的队徽（圆内裁剪 + 徽章色块）
    ctx.save();
    ctx.rotate(b.spin);
    ctx.beginPath(); ctx.arc(0,0,BALL_R-4,0,Math.PI*2); ctx.clip();
    drawBadgeToCanvas(b.team, BALL_R-6);
    ctx.restore();

    // 边框
    ctx.lineWidth=2; ctx.strokeStyle="rgba(0,0,0,.35)";
    ctx.beginPath(); ctx.arc(0,0,BALL_R,0,Math.PI*2); ctx.stroke();
    // 高光
    ctx.fillStyle="rgba(255,255,255,.35)";
    ctx.beginPath(); ctx.ellipse(-9,-10,8,5,-0.6,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ---------- 主循环 ----------
  function loop(ts){
    if(!lastT) lastT=ts;
    let dt=(ts-lastT)/1000; lastT=ts;
    if(dt>0.05) dt=0.05;

    step(dt);
    draw();
    updateClock();

    if(state && state.finished){
      finishMatch();
      return;
    }
    rafId=requestAnimationFrame(loop);
  }

  function updateClock(){
    if(!state) return;
    if(state.pens){
      elClock.textContent = "点球";
      elClockMax.textContent = "大战";
      elExtraTag.textContent = "";
      elBar.style.width = "100%";
      return;
    }
    const m=Math.floor(state.matchMin);
    elClock.textContent = m + "'";
    const maxMin = state.extra ? 120 : 90;
    elClockMax.textContent = "/ " + maxMin + "'";
    elExtraTag.textContent = state.extra ? "加时" : "";
    const denom = state.extra ? 120 : 90;
    elBar.style.width = (state.matchMin/denom*100).toFixed(1)+"%";
  }

  function finishMatch(){
    applyUI(state);
    if(state.pens){
      const a=state.scoreA, b=state.scoreB, pa=state.pens.penA, pb=state.pens.penB;
      const [tA,tB]=state.teams;
      const w=state.pens.winner;
      const title=`${state.teams[w].zh} 获胜（点球）`;
      elOverlayTitle.textContent="点球大战结束 ⚽";
      elOverlayBody.innerHTML =
        `<div class="final-result">
           <div class="final-team ${w===0?'winner':''}">
             ${badgeDomHTML(tA, 48, "fbadge")}
             <div class="fname">${tA.zh}</div>
           </div>
           <div class="final-score">
             ${a}<span class="pen"><small>点球</small>${pa}</span>
             <span class="sep">:</span>
             ${b}<span class="pen"><small>点球</small>${pb}</span>
           </div>
           <div class="final-team ${w===1?'winner':''}">
             ${badgeDomHTML(tB, 48, "fbadge")}
             <div class="fname">${tB.zh}</div>
           </div>
         </div>
         <div style="text-align:center">
           <span class="final-tag">点球 PENS</span>
         </div>
         <div class="final-winner-line">${title}</div>`;
      elStartBtn.textContent="再来一局";
      elOverlay.classList.remove("hidden");
      applyPensScoreboard();
      // 结束后清除选队高亮，允许重新选
      clearSelection();
      return;
    }
    const a=state.scoreA, b=state.scoreB;
    const [tA,tB]=state.teams;
    let winIdx = a>b ? 0 : (b>a ? 1 : -1);
    const tag = winIdx>=0 ? "WIN" : "DRAW";
    const title = winIdx>=0
      ? `${state.teams[winIdx].zh} 获胜`
      : (state.extra ? "加时仍平局" : "常规时间平局");
    elOverlayTitle.textContent = state.extra ? "加时结束 ⚽" : "终场哨响 ⚽";
    elOverlayBody.innerHTML =
      `<div class="final-result">
         <div class="final-team ${winIdx===0?'winner':''}">
           ${badgeDomHTML(tA, 48, "fbadge")}
           <div class="fname">${tA.zh}</div>
         </div>
         <div class="final-score">${a}<span class="sep">:</span>${b}</div>
         <div class="final-team ${winIdx===1?'winner':''}">
           ${badgeDomHTML(tB, 48, "fbadge")}
           <div class="fname">${tB.zh}</div>
         </div>
       </div>
       <div style="text-align:center">
         <span class="final-tag">${tag}</span>
       </div>
       <div class="final-winner-line">${title}</div>`;
    elStartBtn.textContent="再来一局";
    elOverlay.classList.remove("hidden");
    clearSelection();
  }

  // ---------- 控制 ----------
  let pending = null;       // 已选定但尚未开战的双方 [tA, tB]
  let selHome = null;       // 当前已选主队 code
  let selAway = null;       // 当前已选客队 code

  function previewMatch(tA, tB){
    state = newMatch(tA, tB);
    applyUI(state);
    elPensBar.style.display="none";
    pending = [tA, tB];
    elOverlayTitle.textContent = "比赛已选定 ⚽";
    elOverlayBody.innerHTML =
      `<div style="display:flex;align-items:center;justify-content:center;gap:12px;font-size:18px;font-weight:700;flex-wrap:wrap">
         ${badgeDomHTML(tA,42,"badge-dom")}<span>${tA.zh}</span>
         <span style="opacity:.5;font-size:14px;letter-spacing:2px">VS</span>
         ${badgeDomHTML(tB,42,"badge-dom")}<span>${tB.zh}</span>
       </div>
       <div style="opacity:.7;font-size:13px;margin-top:6px">点击下方按钮 / 按空格键开始模拟</div>`;
    elStartBtn.textContent = "开始模拟";
    elOverlay.classList.remove("hidden");
    updateClock();
    draw();
  }

  function start(tA, tB){
    state = newMatch(tA, tB);
    applyUI(state);
    elPensBar.style.display="none";
    elOverlay.classList.add("hidden");
    state.realStart = performance.now()/1000;
    state.started = true;
    kickoffPause(0, true);
    lastT = 0;
    if(rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function doStart(){
    if(pending){
      const [a,b]=pending; pending=null;
      start(a, b);
    } else {
      // 随机开球：也清除积分榜高亮
      clearSelection();
      start(null, null);
    }
  }
  elStartBtn.addEventListener("click", doStart);

  window.addEventListener("keydown", (e)=>{
    if(e.code!=="Space" && e.key!==" ") return;
    if(elOverlay.classList.contains("hidden")) return;
    e.preventDefault();
    doStart();
  });

  // ---------- 积分榜渲染 & 选队 ----------
  function renderStanding(){
    const season = SEASONS[currentSeasonIdx];
    const clubs = season.clubs;
    const rows = clubs.map((row,i)=>{
      const t = CLUBS[row.code];
      const zone = zoneOf(i, clubs.length);
      const gd = row.gf - row.ga;
      return `<tr class="${zone}" data-code="${row.code}">
        <td class="pos">${i+1}</td>
        <td class="tm">${badgeDomHTML(t,0,"badge")}${t.zh}</td>
        <td>${row.pld}</td>
        <td>${row.w}</td>
        <td>${row.d}</td>
        <td>${row.l}</td>
        <td>${gd>0?"+":""}${gd}</td>
        <td class="pts">${row.pts}</td>
      </tr>`;
    }).join("");
    elStandBody.innerHTML = rows;
    elStandBody.querySelectorAll("tr").forEach(tr=>{
      tr.addEventListener("click", ()=>onSelectRow(tr));
    });
    elSeasonSub.textContent = `${season.label} 赛季 · 点第一行=主队 第二行=客队 再点取消`;
  }

  // 选队交互：先点=主队；再点=客队并自动预览；同一行再点=取消该角色
  function onSelectRow(tr){
    const code = tr.dataset.code;
    if(selHome === code){         // 取消主队
      selHome = null;
      // 若客队还在，把客队升为主队？简单起见直接一并清掉
      selAway = null;
      refreshSelectionUI();
      resetPreviewIfNeeded();
      return;
    }
    if(selAway === code){         // 取消客队
      selAway = null;
      refreshSelectionUI();
      resetPreviewIfNeeded();
      return;
    }
    if(!selHome){                 // 选主队
      selHome = code;
      refreshSelectionUI();
      return;
    }
    // 已有主队，且点的不是主队 -> 选/换客队
    selAway = code;
    refreshSelectionUI();
    // 主客都齐 -> 直接预览
    const tA = TEAM_BY_CODE[selHome], tB = TEAM_BY_CODE[selAway];
    previewMatch(tA, tB);
  }

  function refreshSelectionUI(){
    elStandBody.querySelectorAll("tr").forEach(r=>{
      r.classList.remove("home","away");
      if(r.dataset.code === selHome) r.classList.add("home");
      else if(r.dataset.code === selAway) r.classList.add("away");
    });
  }

  function clearSelection(){
    selHome = null; selAway = null;
    refreshSelectionUI();
  }

  // 只选了主队后又取消 -> 回到"未选任何比赛"的初始遮罩
  function resetPreviewIfNeeded(){
    pending = null;
    elOverlayTitle.textContent = "⚽ 西甲小游戏";
    elOverlayBody.innerHTML =
      `点击左侧积分榜任意两支球队<br>依次为主队 / 客队<br>或按 <b>空格键</b> 随机抽两队对战`;
    elStartBtn.textContent = "随机开球";
    elOverlay.classList.remove("hidden");
  }

  // 填充赛季下拉框 + 切换赛季事件
  SEASONS.forEach((s,i)=>{
    const opt=document.createElement("option");
    opt.value=i; opt.textContent=s.label;
    elSeasonSel.appendChild(opt);
  });
  elSeasonSel.addEventListener("change", ()=>{
    currentSeasonIdx = parseInt(elSeasonSel.value, 10) || 0;
    // 切赛季：清空已选队（客队可能不在新赛季名单里）
    selHome = null; selAway = null;
    pending = null;
    renderStanding();               // 重建积分榜（新 DOM，高亮自然清空）
    if(!elOverlay.classList.contains("hidden")){
      resetPreviewIfNeeded();       // 未在比赛中：重置遮罩为初始提示
    }
  });

  renderStanding();

  // 初始：不显示任何球队，仅绘制空球场
  state = {
    teams:[], balls:[], goalCenter: -Math.PI/2,
    goalFlash:0, scoreA:0, scoreB:0, started:false, finished:false,
    extra:false, matchMin:0, rot:0
  };
  elFlagA.textContent=""; elNameA.textContent="主队"; elScoreA.textContent="0";
  elFlagB.textContent=""; elNameB.textContent="客队"; elScoreB.textContent="0";
  draw();
})();
</script>
</body>
</html>
